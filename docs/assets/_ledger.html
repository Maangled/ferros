 CONTROL LEVELS
═══════════════════════════════════════════════════════════════════

  DEMO    — Locked animated showcase, no user interaction
  PREVIEW — Hover/tooltip interaction only, no state mutation
  PLAY    — Full user control, drag-drop, buttons, state changes

═══════════════════════════════════════════════════════════════════
 COMMUNICATION PROTOCOL (postMessage)
═══════════════════════════════════════════════════════════════════

  Parent → Asset:  {type:'ferros:init',   config:{control, data, theme}}
  Parent → Asset:  {type:'ferros:update', payload:{...}}
  Asset  → Parent: {type:'ferros:event',  asset, event, payload}
  Asset  → Parent: {type:'ferros:resize', asset, width, height}

═══════════════════════════════════════════════════════════════════
 DATA SCHEMAS
═══════════════════════════════════════════════════════════════════

  Card Data (shared across card/arena assets):
    { ticker, name, rarity, ability, price, pnl, energy, sector }

  Creature State:
    { name, emoji, stage, stats:{atk,def,spd,wis}, happiness, xp,
      abilities:[{name,icon,cooldown}] }

  Profile State:
    { avatar, name, level, xp:{current,max}, title, matches,
      winRate, deck }

  Ticket Data:
    { ticker, type, direction, entryPrice, exitPrice,
      date, pnl, rarity, sealHash, duration, isFan }

  Store Item:
    { name, price, rarity, category }

  Loot Table Entry:
    { icon, name, rarity, color? }

  Match State (pvp-arena):
    { playerHP, opponentHP, round, timer,
      playerLanes:{day,swing,long}, opponentLanes:{day,swing,long} }

  Board State (game-board):
    { stats:{portfolio,turn,pnl,positions,energy,maxEnergy},
      board:{day:[card],swing:[card],long:[card]} }

 DESIGN SYSTEM
═══════════════════════════════════════════════════════════════════

  Theme:    Dark (--bg-base: #0a0c10)
  Rarity:   common(gray) > uncommon(green) > rare(blue) > epic(purple) >
            legendary(amber) > mythic(pink)
  Shimmer:  ticketShimmer — conic-gradient rotation (holographic)
  Art:      Emoji-first, zero external dependencies
  Protocol: Works on file://, no CDN, no fetch, vanilla JS only
  A11y:     prefers-reduced-motion on all 16 assets, focus-visible,
            ARIA roles/labels, keyboard navigation, screen reader support
