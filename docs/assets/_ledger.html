CONTROL LEVELS:
  DEMO    — Locked animated showcase, no user interaction
  PREVIEW — Hover/tooltip interaction only, no state mutation
  PLAY    — Full user control, drag-drop, buttons, state changes

COMMUNICATION PROTOCOL (postMessage):
  Parent → Asset:  {type:'ferros:init',   config:{control, data, theme}}
  Parent → Asset:  {type:'ferros:update', payload:{...}}
  Asset  → Parent: {type:'ferros:event',  asset, event, payload}
  Asset  → Parent: {type:'ferros:resize', asset, width, height}

DESIGN SYSTEM:
  Theme:    Dark (--bg-base: #0a0c10)
  Rarity:   common(gray) > uncommon(green) > rare(blue) > epic(purple) >
            legendary(amber) > mythic(pink)
  Shimmer:  ticketShimmer — conic-gradient rotation (holographic)
  Art:      Emoji-first, zero external dependencies
  Protocol: Works on file://, no CDN, no fetch, vanilla JS only

CASCADING ASSET HIERARCHY:
  hero-infographic.html
    └─ game-board.html [DEMO]     ← mini battle showcase
    └─ loot-box-3d.html [DEMO]    ← spinning loot teaser
  play-modes (arena tab)
    └─ game-board.html [PLAY]     ← same asset, full control
