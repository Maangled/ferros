<!DOCTYPE html>
<html lang="en" data-ferros-asset="hand-fan" data-version="1.0.0">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FERROS Asset: Hand Fan</title>
<!--
  ╔══════════════════════════════════════════════════╗
  ║  FERROS ASSET: hand-fan                          ║
  ║  Control Levels: DEMO | PREVIEW | PLAY           ║
  ║  Dependencies: none                              ║
  ║  Rarity: common | uncommon | rare | epic |       ║
  ║          legendary | mythic                      ║
  ╚══════════════════════════════════════════════════╝
-->
<style>
/* === FERROS DESIGN TOKENS === */
:root {
  --bg-base: #0a0c10; --bg-panel: #111520; --bg-card: #161b28;
  --bg-card-alt: #1a2035; --bg-highlight: #1e2840;
  --border-dim: #1e2a3a; --border-accent: #2a3f5f; --border-bright: #3a5a8f;
  --text-primary: #e8edf5; --text-secondary: #8fa0b8; --text-dim: #5a6a80; --text-code: #7eb8e8;
  --accent-blue: #4a90d9; --accent-cyan: #2dd4bf; --accent-green: #34d399;
  --accent-amber: #f59e0b; --accent-red: #f87171; --accent-purple: #a78bfa;
  --accent-pink: #f472b6; --accent-orange: #fb923c;
  --gradient-card: linear-gradient(145deg, #161b28 0%, #111520 100%);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.4);
  --radius-card: 8px; --radius-panel: 12px;
  --font-mono: 'Courier New', Courier, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-base); color: var(--text-primary); }

/* === PLAYER HAND === */
.player-hand {
  display: flex; justify-content: center; align-items: flex-end; gap: 0;
  margin: 1.5rem 0; padding: 30px 16px 16px;
  background: var(--bg-panel); border: 1px dashed var(--border-accent);
  border-radius: var(--radius-panel); position: relative;
}
.player-hand::before {
  content: 'YOUR HAND'; position: absolute; top: -10px; left: 16px;
  font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim);
  background: var(--bg-base); padding: 0 8px; letter-spacing: 0.1em;
}

/* === HAND CARD === */
.hand-card {
  background: var(--bg-card); border: 2px solid var(--border-dim); border-radius: 10px;
  padding: 10px; width: 135px; min-height: 175px; cursor: grab;
  transition: transform 0.3s, box-shadow 0.3s; position: relative; overflow: hidden;
  aspect-ratio: 63/88; display: flex; flex-direction: column;
}
.hand-card:nth-child(1) { transform: rotate(-8deg) translateY(6px); z-index: 1; margin-right: -12px; }
.hand-card:nth-child(2) { transform: rotate(-3deg) translateY(1px); z-index: 2; margin-right: -10px; }
.hand-card:nth-child(3) { transform: rotate(3deg) translateY(1px); z-index: 2; margin-right: -10px; }
.hand-card:nth-child(4) { transform: rotate(8deg) translateY(6px); z-index: 1; }
.hand-card:hover {
  transform: translateY(-16px) rotate(0deg) scale(1.05) !important;
  box-shadow: 0 12px 30px rgba(0,0,0,0.6); z-index: 10 !important;
}
.hand-card:active { cursor: grabbing; }
.hand-card.dragging { opacity: 0.4; transform: scale(0.95) !important; }
.hand-card::before {
  content: ''; position: absolute; top: -60%; left: -60%; width: 220%; height: 220%;
  background: conic-gradient(transparent, var(--hc-glow, rgba(45,212,191,0.08)), transparent 30%);
  animation: ticketShimmer 9s linear infinite; opacity: 0.3; pointer-events: none;
}
.hand-card[data-rarity="epic"]      { border-color: rgba(167,139,250,0.5); --hc-glow: rgba(167,139,250,0.12); }
.hand-card[data-rarity="rare"]      { border-color: rgba(74,144,217,0.4);  --hc-glow: rgba(74,144,217,0.1); }
.hand-card[data-rarity="uncommon"]  { border-color: rgba(52,211,153,0.35); --hc-glow: rgba(52,211,153,0.08); }
.hand-card[data-rarity="legendary"] { border-color: rgba(245,158,11,0.5);  --hc-glow: rgba(245,158,11,0.15); }

/* Card inner structure */
.tc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.tc-ticker { font-family: var(--font-mono); font-size: 0.85rem; font-weight: 800; color: var(--accent-cyan); letter-spacing: 0.04em; }
.tc-rarity { font-size: 0.5rem; padding: 1px 5px; border-radius: 3px; font-family: var(--font-mono); font-weight: 600; text-transform: uppercase; }
.rarity-epic      { background: rgba(167,139,250,0.15); color: var(--accent-purple); border: 1px solid rgba(167,139,250,0.3); }
.rarity-rare      { background: rgba(74,144,217,0.15); color: var(--accent-blue); border: 1px solid rgba(74,144,217,0.3); }
.rarity-uncommon  { background: rgba(52,211,153,0.15); color: var(--accent-green); border: 1px solid rgba(52,211,153,0.3); }
.rarity-legendary { background: rgba(245,158,11,0.15); color: var(--accent-amber); border: 1px solid rgba(245,158,11,0.3); }
.tc-name { font-size: 0.65rem; color: var(--text-secondary); margin-bottom: 4px; }
.tc-stat { font-size: 0.58rem; color: var(--text-dim); font-family: var(--font-mono); }
.tc-stat-val { color: var(--text-secondary); font-weight: 600; }
.tc-ability {
  margin-top: auto; padding: 4px 6px; font-size: 0.6rem; font-weight: 600;
  border-radius: 5px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.tc-ability:hover { filter: brightness(1.2); transform: scale(1.02); }
.tc-ability[data-ability="rally"]     { background: rgba(248,113,113,0.12); color: var(--accent-red); border: 1px solid rgba(248,113,113,0.25); }
.tc-ability[data-ability="barrier"]   { background: rgba(45,212,191,0.1); color: var(--accent-cyan); border: 1px solid rgba(45,212,191,0.25); }
.tc-ability[data-ability="lifesteal"] { background: rgba(52,211,153,0.1); color: var(--accent-green); border: 1px solid rgba(52,211,153,0.25); }
.tc-ability[data-ability="overwhelm"] { background: rgba(245,158,11,0.12); color: var(--accent-amber); border: 1px solid rgba(245,158,11,0.25); }

@keyframes ticketShimmer { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes demoBob { 0%,100% { transform: var(--bob-base) translateY(0); } 50% { transform: var(--bob-base) translateY(-5px); } }

/* DEMO mode */
[data-control="demo"] .hand-card {
  pointer-events: none; cursor: default;
}
[data-control="demo"] .hand-card:nth-child(1) { --bob-base: rotate(-8deg) translateY(6px); animation: demoBob 3.2s ease-in-out infinite; }
[data-control="demo"] .hand-card:nth-child(2) { --bob-base: rotate(-3deg) translateY(1px); animation: demoBob 3.5s ease-in-out infinite 0.3s; }
[data-control="demo"] .hand-card:nth-child(3) { --bob-base: rotate(3deg) translateY(1px); animation: demoBob 3.8s ease-in-out infinite 0.6s; }
[data-control="demo"] .hand-card:nth-child(4) { --bob-base: rotate(8deg) translateY(6px); animation: demoBob 4.1s ease-in-out infinite 0.9s; }
[data-control="demo"] .tc-ability { cursor: default; pointer-events: none; }

/* PREVIEW mode */
[data-control="preview"] .hand-card { cursor: default; }
[data-control="preview"] .tc-ability { cursor: help; pointer-events: none; }

/* Standalone layout */
.asset-showcase { padding: 24px; display: flex; justify-content: center; }
</style>
</head>
<body>
<div id="ferros-asset-root" data-control="demo">
  <div class="asset-showcase">
    <div class="player-hand">
      <!-- TSLA epic Rally -->
      <div class="hand-card" data-rarity="epic" draggable="true" data-ticker="TSLA">
        <div class="tc-top"><span class="tc-ticker">TSLA</span><span class="tc-rarity rarity-epic">EPIC</span></div>
        <div class="tc-name">Tesla Inc.</div>
        <div class="tc-stat">ATK: <span class="tc-stat-val">88</span></div>
        <div class="tc-stat">DEF: <span class="tc-stat-val">42</span></div>
        <div class="tc-ability" data-ability="rally">⚡ Rally</div>
      </div>
      <!-- META rare Barrier -->
      <div class="hand-card" data-rarity="rare" draggable="true" data-ticker="META">
        <div class="tc-top"><span class="tc-ticker">META</span><span class="tc-rarity rarity-rare">RARE</span></div>
        <div class="tc-name">Meta Platforms</div>
        <div class="tc-stat">ATK: <span class="tc-stat-val">71</span></div>
        <div class="tc-stat">DEF: <span class="tc-stat-val">65</span></div>
        <div class="tc-ability" data-ability="barrier">🛡️ Barrier</div>
      </div>
      <!-- DIS uncommon Lifesteal -->
      <div class="hand-card" data-rarity="uncommon" draggable="true" data-ticker="DIS">
        <div class="tc-top"><span class="tc-ticker">DIS</span><span class="tc-rarity rarity-uncommon">UNCOMMON</span></div>
        <div class="tc-name">Walt Disney Co.</div>
        <div class="tc-stat">ATK: <span class="tc-stat-val">54</span></div>
        <div class="tc-stat">DEF: <span class="tc-stat-val">58</span></div>
        <div class="tc-ability" data-ability="lifesteal">💚 Lifesteal</div>
      </div>
      <!-- AMZN legendary Overwhelm -->
      <div class="hand-card" data-rarity="legendary" draggable="true" data-ticker="AMZN">
        <div class="tc-top"><span class="tc-ticker">AMZN</span><span class="tc-rarity rarity-legendary">LEGEND</span></div>
        <div class="tc-name">Amazon.com Inc.</div>
        <div class="tc-stat">ATK: <span class="tc-stat-val">94</span></div>
        <div class="tc-stat">DEF: <span class="tc-stat-val">72</span></div>
        <div class="tc-ability" data-ability="overwhelm">💥 Overwhelm</div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';
  var root = document.getElementById('ferros-asset-root');
  var isEmbedded = window.parent !== window;
  var params = new URLSearchParams(window.location.search);
  var control = params.get('control') || 'demo';

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'ferros:init') {
      control = e.data.config.control || control;
      applyControl();
    }
    if (e.data && e.data.type === 'ferros:update' && e.data.payload) {
      updateHand(e.data.payload);
    }
  });

  function applyControl() {
    root.dataset.control = control;
    if (control === 'play') initDrag();
  }

  function emit(event, payload) {
    if (isEmbedded) {
      window.parent.postMessage({ type: 'ferros:event', asset: 'hand-fan', event: event, payload: payload }, '*');
    }
  }

  function reportSize() {
    if (isEmbedded) {
      window.parent.postMessage({ type: 'ferros:resize', asset: 'hand-fan', width: root.scrollWidth, height: root.scrollHeight }, '*');
    }
  }

  // Drag-and-drop for PLAY mode
  function initDrag() {
    var cards = root.querySelectorAll('.hand-card');
    cards.forEach(function(card) {
      card.addEventListener('dragstart', function(e) {
        card.classList.add('dragging');
        e.dataTransfer.setData('text/plain', card.dataset.ticker);
        e.dataTransfer.effectAllowed = 'move';
        emit('card-dragged', { ticker: card.dataset.ticker, action: 'start' });
      });
      card.addEventListener('dragend', function() {
        card.classList.remove('dragging');
        emit('card-dragged', { ticker: card.dataset.ticker, action: 'end' });
      });
    });
  }

  // Update hand data from parent
  function updateHand(data) {
    if (!data.cards) return;
    // Future: dynamically update hand contents
  }

  applyControl();
  reportSize();
  if (typeof ResizeObserver !== 'undefined') new ResizeObserver(reportSize).observe(root);
})();
</script>
</body>
</html>
