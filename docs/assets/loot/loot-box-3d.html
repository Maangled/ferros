<!DOCTYPE html>
<html lang="en" data-ferros-project="loot-box-3d" data-version="1.1.0">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FERROS Project Pointer: Loot Box Assembly</title>
<style>
html, body {
  margin: 0;
  min-height: 100%;
  background: transparent;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  font: 12px/1.4 "Courier New", monospace;
  color: #5a6a80;
}

.project-manifest-hint {
  padding: 10px 12px;
  border: 1px dashed rgba(74, 144, 217, 0.25);
  border-radius: 999px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: rgba(10, 12, 16, 0.08);
}
</style>
</head>
<body>
<div class="project-manifest-hint" aria-hidden="true">FERROS project manifest moved to JSON</div>

<script>
(function() {
  'use strict';

  var manifestPath = 'loot-box-3d.json';

  fetch(manifestPath)
    .then(function(response) {
      if (!response.ok) {
        throw new Error('HTTP ' + response.status);
      }
      return response.json();
    })
    .then(function(manifest) {
      window.FERROS_PROJECT = manifest;

      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'ferros:project-ready',
          project: {
            id: manifest.id,
            name: manifest.name,
            manifestFile: manifestPath,
            renderFile: manifest.renderFile
          }
        }, '*');
      }
    })
    .catch(function() {
      document.querySelector('.project-manifest-hint').textContent = 'FERROS project manifest unavailable';
    });
})();
</script>
</body>
</html>
