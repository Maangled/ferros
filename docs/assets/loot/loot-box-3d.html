<!DOCTYPE html>
<html lang="en" data-ferros-asset="loot-box-3d" data-version="1.0.0">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FERROS Asset: 3D Loot Box</title>
<!--
  ╔══════════════════════════════════════════════════╗
  ║  FERROS ASSET: loot-box-3d                       ║
  ║  Control Levels: DEMO | PREVIEW | PLAY           ║
  ║  Dependencies: none                              ║
  ║  Click to open — shake, dissolve, reveal reward  ║
  ╚══════════════════════════════════════════════════╝
-->
<style>
/* === FERROS DESIGN TOKENS === */
:root {
  --bg-base: #0a0c10; --bg-panel: #111520; --bg-card: #161b28;
  --border-dim: #1e2a3a; --border-accent: #2a3f5f;
  --text-primary: #e8edf5; --text-secondary: #8fa0b8; --text-dim: #5a6a80;
  --accent-blue: #4a90d9; --accent-cyan: #2dd4bf; --accent-green: #34d399;
  --accent-amber: #f59e0b; --accent-red: #f87171; --accent-purple: #a78bfa;
  --accent-pink: #f472b6;
  --gradient-card: linear-gradient(145deg, #161b28 0%, #111520 100%);
  --font-mono: 'Courier New', Courier, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-base); color: var(--text-primary); display: flex; align-items: center; justify-content: center; min-height: 100vh; }

/* === 3D LOOT BOX === */
.loot-3d-platform { display: flex; flex-direction: column; align-items: center; padding: 2rem; }
.loot-3d-scene { width: 160px; height: 160px; perspective: 600px; cursor: pointer; }
.loot-3d-cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: lootRotate 8s linear infinite; transition: transform 0.5s; }
.loot-3d-scene:hover .loot-3d-cube { animation-play-state: paused; }
.loot-3d-face { position: absolute; width: 100px; height: 100px; left: 30px; top: 30px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; background: var(--gradient-card); border: 2px solid var(--accent-purple); border-radius: 12px; box-shadow: 0 0 20px rgba(167,139,250,0.2); }
.loot-3d-face.front  { transform: translateZ(50px); }
.loot-3d-face.back   { transform: rotateY(180deg) translateZ(50px); }
.loot-3d-face.right  { transform: rotateY(90deg) translateZ(50px); }
.loot-3d-face.left   { transform: rotateY(-90deg) translateZ(50px); }
.loot-3d-face.top    { transform: rotateX(90deg) translateZ(50px); }
.loot-3d-face.bottom { transform: rotateX(-90deg) translateZ(50px); }

.loot-hint { margin-top: 12px; font-size: 0.75rem; color: var(--text-dim); font-family: var(--font-mono); }

.loot-result { text-align: center; margin-top: 20px; opacity: 0; transition: opacity 0.5s; pointer-events: none; }
.loot-result.visible { opacity: 1; }
.loot-result-icon { font-size: 3rem; }
.loot-result-name { font-size: 1rem; font-weight: 700; color: var(--text-primary); margin-top: 4px; }
.loot-result-rarity { font-family: var(--font-mono); font-size: 0.8rem; font-weight: 700; margin-top: 2px; }

.loot-particles { position: relative; height: 0; overflow: visible; pointer-events: none; }
.loot-particle { position: absolute; width: 8px; height: 8px; border-radius: 50%; animation: lootParticle 0.8s ease-out forwards; }

@keyframes lootRotate { 0% { transform: rotateY(0) rotateX(10deg); } 100% { transform: rotateY(360deg) rotateX(10deg); } }
@keyframes lootShake { 0%,100% { transform: translateX(0) rotate(0); } 15% { transform: translateX(-6px) rotate(-3deg); } 30% { transform: translateX(6px) rotate(3deg); } 45% { transform: translateX(-4px) rotate(-2deg); } 60% { transform: translateX(4px) rotate(2deg); } 75% { transform: translateX(-2px) rotate(-1deg); } 90% { transform: translateX(2px) rotate(1deg); } }
@keyframes lootParticle { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--lp-x), var(--lp-y)) scale(0); opacity: 0; } }

/* DEMO mode — auto-rotates, no click */
[data-control="demo"] .loot-3d-scene { cursor: default; pointer-events: none; }
[data-control="demo"] .loot-hint { display: none; }
/* PREVIEW mode — hover pauses, no click */
[data-control="preview"] .loot-3d-scene { cursor: default; }
</style>
</head>
<body>
<div id="ferros-asset-root" data-control="demo">
  <div class="loot-3d-platform">
    <div class="loot-3d-scene" id="loot-3d-scene">
      <div class="loot-3d-cube" id="loot-3d-cube">
        <div class="loot-3d-face front">📦</div>
        <div class="loot-3d-face back">🎁</div>
        <div class="loot-3d-face right">✨</div>
        <div class="loot-3d-face left">💎</div>
        <div class="loot-3d-face top">⭐</div>
        <div class="loot-3d-face bottom">🔮</div>
      </div>
    </div>
    <div class="loot-hint">Click to open</div>
    <div class="loot-particles" id="loot-particles"></div>
    <div class="loot-result" id="loot-result">
      <div class="loot-result-icon" id="loot-item-icon"></div>
      <div class="loot-result-name" id="loot-item-name"></div>
      <div class="loot-result-rarity" id="loot-item-rarity"></div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';
  var root = document.getElementById('ferros-asset-root');
  var isEmbedded = window.parent !== window;
  var params = new URLSearchParams(window.location.search);
  var control = params.get('control') || 'demo';

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'ferros:init') {
      control = e.data.config.control || control;
      applyControl();
    }
  });

  function applyControl() { root.dataset.control = control; }
  function emit(event, payload) {
    if (isEmbedded) window.parent.postMessage({ type: 'ferros:event', asset: 'loot-box-3d', event: event, payload: payload }, '*');
  }
  function reportSize() {
    if (isEmbedded) window.parent.postMessage({ type: 'ferros:resize', asset: 'loot-box-3d', width: root.scrollWidth, height: root.scrollHeight }, '*');
  }

  // Loot items
  var lootItems = [
    { icon: '🎴', name: 'Holographic NVDA Skin', rarity: 'EPIC', color: 'var(--accent-purple)' },
    { icon: '🌌', name: 'Nebula Board Theme', rarity: 'LEGENDARY', color: 'var(--accent-amber)' },
    { icon: '🎩', name: 'Top Hat Accessory', rarity: 'UNCOMMON', color: 'var(--accent-green)' },
    { icon: '💎', name: 'Diamond Card Back', rarity: 'RARE', color: 'var(--accent-blue)' },
    { icon: '🃏', name: 'Neon Edge Card Skin', rarity: 'RARE', color: 'var(--accent-blue)' },
    { icon: '🗿', name: 'Stone Guardian Costume', rarity: 'COMMON', color: 'var(--text-dim)' },
    { icon: '🎆', name: 'Fireworks Victory Animation', rarity: 'EPIC', color: 'var(--accent-purple)' },
    { icon: '🌈', name: 'Rainbow Emote', rarity: 'COMMON', color: 'var(--text-dim)' },
    { icon: '🔥', name: 'Flame Trail Effect', rarity: 'RARE', color: 'var(--accent-blue)' },
    { icon: '👑', name: 'Golden Crown (Creature)', rarity: 'LEGENDARY', color: 'var(--accent-amber)' }
  ];

  var loot3dScene = document.getElementById('loot-3d-scene');
  var loot3dCube = document.getElementById('loot-3d-cube');
  var lootResult = document.getElementById('loot-result');
  var lootParticles = document.getElementById('loot-particles');
  var lootOpen = false;

  if (loot3dScene) {
    loot3dScene.addEventListener('click', function() {
      if (control !== 'play' || lootOpen) return;
      lootOpen = true;
      lootResult.classList.remove('visible');
      loot3dCube.style.animation = 'lootShake 0.5s ease-in-out';
      setTimeout(function() {
        spawnParticles();
        loot3dCube.style.transition = 'transform 0.6s, opacity 0.6s';
        loot3dCube.style.transform = 'scale(0) rotateY(720deg)';
        loot3dCube.style.opacity = '0';
        setTimeout(function() {
          var item = lootItems[Math.floor(Math.random() * lootItems.length)];
          document.getElementById('loot-item-icon').textContent = item.icon;
          document.getElementById('loot-item-name').textContent = item.name;
          var rarityEl = document.getElementById('loot-item-rarity');
          rarityEl.textContent = item.rarity;
          rarityEl.style.color = item.color;
          lootResult.classList.add('visible');
          emit('loot-opened', { name: item.name, rarity: item.rarity });
          setTimeout(function() {
            loot3dCube.style.transition = 'none';
            loot3dCube.style.transform = '';
            loot3dCube.style.opacity = '';
            loot3dCube.style.animation = 'lootRotate 8s linear infinite';
            lootOpen = false;
          }, 2500);
        }, 600);
      }, 500);
    });
  }

  function spawnParticles() {
    if (!lootParticles) return;
    lootParticles.innerHTML = '';
    var colors = ['#f59e0b', '#a78bfa', '#2dd4bf', '#f472b6', '#4a90d9', '#34d399', '#f87171'];
    for (var i = 0; i < 20; i++) {
      var p = document.createElement('div');
      p.classList.add('loot-particle');
      var angle = (Math.PI * 2 / 20) * i;
      var dist = 60 + Math.random() * 80;
      p.style.setProperty('--lp-x', (Math.cos(angle) * dist) + 'px');
      p.style.setProperty('--lp-y', (Math.sin(angle) * dist) + 'px');
      p.style.left = '50%'; p.style.top = '50%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDelay = (Math.random() * 0.2) + 's';
      lootParticles.appendChild(p);
    }
  }

  applyControl();
  reportSize();
  if (typeof ResizeObserver !== 'undefined') new ResizeObserver(reportSize).observe(root);
})();
</script>
</body>
</html>
