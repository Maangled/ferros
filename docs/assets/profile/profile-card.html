<!DOCTYPE html>
<html lang="en" data-ferros-asset="profile-card" data-version="1.0.0">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FERROS Asset: User Profile</title>
<!--
  ╔══════════════════════════════════════════════════╗
  ║  FERROS ASSET: profile-card                      ║
  ║  Control Levels: DEMO | PREVIEW | PLAY           ║
  ║  Dependencies: none                              ║
  ║  Display-only profile asset                      ║
  ╚══════════════════════════════════════════════════╝
-->
<style>
/* === FERROS DESIGN TOKENS === */
:root {
  --bg-base: #0a0c10; --bg-panel: #111520; --bg-card: #161b28; --bg-card-alt: #1a2035; --bg-highlight: #1e2840;
  --border-dim: #1e2a3a; --border-accent: #2a3f5f; --border-bright: #3a5a8f;
  --text-primary: #e8edf5; --text-secondary: #8fa0b8; --text-dim: #5a6a80; --text-code: #7eb8e8;
  --accent-blue: #4a90d9; --accent-cyan: #2dd4bf; --accent-green: #34d399; --accent-amber: #f59e0b;
  --accent-red: #f87171; --accent-purple: #a78bfa; --accent-pink: #f472b6; --accent-orange: #fb923c;
  --gradient-header: linear-gradient(135deg, #0d1b35 0%, #0a1525 50%, #091020 100%);
  --gradient-card: linear-gradient(145deg, #161b28 0%, #111520 100%);
  --gradient-accent: linear-gradient(90deg, #4a90d9 0%, #2dd4bf 100%);
  --shadow-panel: 0 4px 24px rgba(0,0,0,0.6); --shadow-card: 0 2px 12px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 12px rgba(74,144,217,.35);
  --radius-panel: 12px; --radius-card: 8px; --radius-badge: 4px;
  --font-mono: 'Courier New', Courier, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-base); color: var(--text-primary); }

/* === PROFILE LAYOUT === */
.profile-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 20px;
  padding: 20px;
  max-width: 900px;
  margin: 0 auto;
}
@media (max-width: 680px) {
  .profile-layout { grid-template-columns: 1fr; }
}

/* === PROFILE CARD === */
.profile-card {
  background: var(--gradient-card);
  border: 2px solid var(--border-dim);
  border-radius: var(--radius-panel);
  padding: 24px;
  text-align: center;
  box-shadow: var(--shadow-panel);
}
.profile-avatar {
  font-size: 3.5rem;
  width: 80px; height: 80px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px;
  background: var(--bg-highlight);
  border-radius: 50%;
  border: 2px solid var(--border-accent);
}
.profile-name { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; }
.profile-level {
  display: inline-block;
  font-size: 0.62rem; font-family: var(--font-mono); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 2px 10px; border-radius: 12px;
  background: rgba(74,144,217,0.15); color: var(--accent-blue);
  border: 1px solid rgba(74,144,217,0.3);
  margin-bottom: 16px;
}

/* XP Bar */
.profile-xp { margin-bottom: 20px; }
.profile-xp-label {
  display: flex; justify-content: space-between;
  font-size: 0.65rem; font-family: var(--font-mono); color: var(--text-dim);
  margin-bottom: 6px;
}
.profile-xp-bar {
  width: 100%; height: 8px;
  background: var(--bg-base);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--border-dim);
}
.profile-xp-fill {
  height: 100%;
  background: var(--gradient-accent);
  border-radius: 4px;
  transition: width 2s ease;
  width: 0%;
}

/* Stats Grid */
.profile-stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.profile-stat {
  background: var(--bg-base);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-card);
  padding: 10px 8px;
}
.profile-stat-val {
  font-size: 1rem; font-weight: 800;
  font-family: var(--font-mono);
  color: var(--text-primary);
}
.profile-stat-label {
  font-size: 0.6rem; color: var(--text-dim);
  margin-top: 2px;
}

/* === HOLDINGS === */
.profile-holdings {
  background: var(--gradient-card);
  border: 2px solid var(--border-dim);
  border-radius: var(--radius-panel);
  padding: 20px;
  box-shadow: var(--shadow-panel);
}
.profile-holdings-title {
  font-size: 0.85rem; font-weight: 700;
  margin-bottom: 14px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* Holdings Stock Grid */
.profile-stocks-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (max-width: 480px) {
  .profile-stocks-grid { grid-template-columns: 1fr; }
}
.holding-card {
  background: var(--bg-card-alt);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-card);
  padding: 12px;
  transition: border-color 0.3s;
}
.holding-card:hover { border-color: var(--border-accent); }
.holding-card.rarity-epic { border-left: 3px solid rgba(167,139,250,0.5); }
.holding-card.rarity-legendary { border-left: 3px solid rgba(245,158,11,0.5); }
.holding-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.holding-ticker {
  font-family: var(--font-mono); font-size: 0.85rem; font-weight: 800;
  color: var(--accent-cyan);
}
.holding-rarity {
  font-size: 0.55rem; font-family: var(--font-mono); font-weight: 600;
  text-transform: uppercase; padding: 1px 5px;
  border-radius: var(--radius-badge);
}
.holding-rarity.epic { background: rgba(167,139,250,0.15); color: var(--accent-purple); border: 1px solid rgba(167,139,250,0.3); }
.holding-rarity.legendary { background: rgba(245,158,11,0.15); color: var(--accent-amber); border: 1px solid rgba(245,158,11,0.3); }
.holding-pnl {
  font-family: var(--font-mono); font-size: 0.78rem; font-weight: 700;
}
.holding-pnl.positive { color: var(--accent-green); }
.holding-pnl.negative { color: var(--accent-red); }
</style>
</head>
<body>
<div id="ferros-asset-root" data-control="demo">
  <div class="profile-layout">

    <!-- Profile Card -->
    <div class="profile-card">
      <div class="profile-avatar">&#x1F9D1;&#x200D;&#x1F4BC;</div>
      <div class="profile-name">CryptoSamurai42</div>
      <div class="profile-level">Level 24</div>

      <div class="profile-xp">
        <div class="profile-xp-label">
          <span>XP 7,420 / 10,000</span>
          <span>74%</span>
        </div>
        <div class="profile-xp-bar">
          <div class="profile-xp-fill" id="xp-fill"></div>
        </div>
      </div>

      <div class="profile-stats-grid">
        <div class="profile-stat">
          <div class="profile-stat-val">142</div>
          <div class="profile-stat-label">Trades</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-val">68%</div>
          <div class="profile-stat-label">Win Rate</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-val">94d</div>
          <div class="profile-stat-label">Longest Hold</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-val">+$2.4K</div>
          <div class="profile-stat-label">Best P&amp;L</div>
        </div>
      </div>
    </div>

    <!-- Holdings -->
    <div class="profile-holdings">
      <div class="profile-holdings-title">Holdings</div>
      <div class="profile-stocks-grid">

        <div class="holding-card rarity-epic">
          <div class="holding-top">
            <span class="holding-ticker">NVDA</span>
            <span class="holding-rarity epic">EPIC</span>
          </div>
          <div class="holding-pnl positive">+$142.60</div>
        </div>

        <div class="holding-card rarity-legendary">
          <div class="holding-top">
            <span class="holding-ticker">AAPL</span>
            <span class="holding-rarity legendary">LEGEND</span>
          </div>
          <div class="holding-pnl positive">+$340.00</div>
        </div>

        <div class="holding-card rarity-legendary">
          <div class="holding-top">
            <span class="holding-ticker">MSFT</span>
            <span class="holding-rarity legendary">LEGEND</span>
          </div>
          <div class="holding-pnl positive">+$86.20</div>
        </div>

        <div class="holding-card rarity-epic">
          <div class="holding-top">
            <span class="holding-ticker">TSLA</span>
            <span class="holding-rarity epic">EPIC</span>
          </div>
          <div class="holding-pnl negative">-$28.40</div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
(function() {
  'use strict';
  var root = document.getElementById('ferros-asset-root');
  var isEmbedded = window.parent !== window;
  var params = new URLSearchParams(window.location.search);
  var control = params.get('control') || 'demo';

  /* === FERROS ASSET PROTOCOL === */
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'ferros:init') {
      control = e.data.config.control || control;
      applyControl();
    }
    if (e.data && e.data.type === 'ferros:update' && e.data.payload) {
      // Future: update profile data dynamically
    }
  });

  function applyControl() {
    root.dataset.control = control;
    if (control === 'demo') startDemo();
  }

  function emit(event, payload) {
    if (isEmbedded) {
      window.parent.postMessage({ type: 'ferros:event', asset: 'profile-card', event: event, payload: payload }, '*');
    }
  }

  function reportSize() {
    if (isEmbedded) {
      window.parent.postMessage({ type: 'ferros:resize', asset: 'profile-card', width: root.scrollWidth, height: root.scrollHeight }, '*');
    }
  }

  /* === DEMO: XP bar fill animation === */
  function startDemo() {
    var fill = document.getElementById('xp-fill');
    if (!fill) return;
    fill.style.width = '0%';
    setTimeout(function() { fill.style.width = '74%'; }, 300);
  }

  applyControl();
  reportSize();
  if (typeof ResizeObserver !== 'undefined') new ResizeObserver(reportSize).observe(root);
})();
</script>
</body>
</html>
