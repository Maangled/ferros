<!DOCTYPE html>
<html lang="en" data-ferros-asset="hand-fan" data-version="3.0.0">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FERROS Asset: Hand Fan</title>
<!--
  ╔══════════════════════════════════════════════════╗
  ║  FERROS ASSET: hand-fan  v3.0.0                 ║
  ║  Control Levels: DEMO | PREVIEW | PLAY           ║
  ║  Dependencies: _core/_runtime.js v1.0.0          ║
  ║                _lib/_shimmer.css v1.0.0          ║
  ║                _lib/_escape-html.js v1.0.0       ║
  ║  Rarity: common | uncommon | rare | epic |       ║
  ║          legendary | mythic                      ║
  ║                                                  ║
  ║  v3.0.0 — Modular rendering system (ADR-008)    ║
  ║  - Uses canonical _tokens.css, _core/_runtime.js ║
  ║  - Uses _core/_a11y.css for base a11y           ║
  ║  - Uses _lib/_shimmer.css for ticketShimmer      ║
  ║  - Uses _lib/_escape-html.js for esc()          ║
  ║  - window.onFerrosInit / onFerrosUpdate callbacks║
  ║                                                  ║
  ║  Preserved from v2:                              ║
  ║  - ferros:update dynamic rebuild                 ║
  ║  - JS-calculated fan angles (1-7+ cards)         ║
  ║  - Ability click handlers + glow animation       ║
  ║  - card-played event with full payload           ║
  ║  - Touch drag with ghost                         ║
  ║  - Responsive stack at 400px                     ║
  ║  - Accessibility (ARIA, keyboard, focus)          ║
  ║  - prefers-reduced-motion                        ║
  ╚══════════════════════════════════════════════════╝
-->
<style>
/* @inline _tokens.css */
/* ferros-tokens v2.0.0
 *
 * FERROS Design Tokens — single canonical source
 * All 16 render assets inline this file via @inline marker.
 * Assets may override any token by redefining in their own :root block.
 *
 * Consumers: all asset HTML files under docs/assets/
 * NOT used by: schedule-ledger.html (different design system)
 *
 * v2.0.0 — absorb rarity + stage tokens from asset copies (ADR-008)
 * v1.0.0 — initial token set (6 dark-theme pages)
 */
:root {
  /* === Backgrounds === */
  --bg-base:        #0a0c10;
  --bg-panel:       #111520;
  --bg-card:        #161b28;
  --bg-card-alt:    #1a2035;
  --bg-highlight:   #1e2840;

  /* === Borders === */
  --border-dim:     #1e2a3a;
  --border-accent:  #2a3f5f;
  --border-bright:  #3a5a8f;

  /* === Text === */
  --text-primary:   #e8edf5;
  --text-secondary: #8fa0b8;
  --text-dim:       #5a6a80;
  --text-code:      #7eb8e8;

  /* === Accents === */
  --accent-blue:    #4a90d9;
  --accent-cyan:    #2dd4bf;
  --accent-green:   #34d399;
  --accent-amber:   #f59e0b;
  --accent-red:     #f87171;
  --accent-purple:  #a78bfa;
  --accent-pink:    #f472b6;
  --accent-orange:  #fb923c;

  /* === Rarity System === */
  --rarity-common:    #5a6a80;
  --rarity-uncommon:  #34d399;
  --rarity-rare:      #4a90d9;
  --rarity-epic:      #a78bfa;
  --rarity-legendary: #f59e0b;
  --rarity-mythic:    #f472b6;

  /* === Stage / 3D Scene === */
  --stage-grid-major: rgba(74,144,217, 0.10);
  --stage-grid-minor: rgba(74,144,217, 0.03);
  --stage-fog-color:  var(--bg-base);

  /* === Gradients === */
  --gradient-header: linear-gradient(135deg, #0d1b35 0%, #0a1525 50%, #091020 100%);
  --gradient-card:   linear-gradient(145deg, #161b28 0%, #111520 100%);
  --gradient-accent: linear-gradient(90deg, #4a90d9 0%, #2dd4bf 100%);

  /* === Shadows === */
  --shadow-panel:  0 4px 24px rgba(0, 0, 0, 0.6);
  --shadow-card:   0 2px 12px rgba(0, 0, 0, 0.4);
  --shadow-glow:   0 0 12px rgba(74,144,217,.35);

  /* === Radii === */
  --radius-panel:  12px;
  --radius-card:   8px;
  --radius-badge:  4px;

  /* === Typography === */
  --font-mono: 'Courier New', Courier, monospace;
}

/* @inline _core/_a11y.css */
/* ferros-a11y v1.0.0
 *
 * Accessibility CSS primitives for all FERROS render assets.
 * Provides: .sr-only, :focus-visible base, prefers-reduced-motion reset.
 *
 * See: ADR-008 (docs/adr/ADR-008-modular-rendering-system.md)
 */

/* Screen-reader-only text */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* Focus-visible baseline — assets can override with higher-specificity selectors */
:focus-visible {
  outline: 2px solid var(--accent-cyan, #2dd4bf);
  outline-offset: 2px;
}

/* Reduced-motion: kill all animation globally, assets layer their own overrides on top */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* @inline _lib/_shimmer.css */
/* ferros-shimmer v1.0.0
 *
 * Conic shimmer keyframe used for card and ticket effects.
 * Apply via animation: ticketShimmer 3s linear infinite;
 * Typically used on a ::before pseudo-element with conic-gradient.
 *
 * Consumers: trading-card, hand-fan, deck-builder, game-board, scratcher, ticket-gallery
 * See: ADR-008 (docs/adr/ADR-008-modular-rendering-system.md)
 */

@keyframes ticketShimmer {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

@media (prefers-reduced-motion: reduce) {
  @keyframes ticketShimmer {
    from { transform: none; }
    to   { transform: none; }
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-base); color: var(--text-primary); }

/* === PLAYER HAND === */
.player-hand {
  display: flex; justify-content: center; align-items: flex-end; gap: 0;
  margin: 1.5rem 0; padding: 30px 16px 16px;
  background: var(--bg-panel); border: 1px dashed var(--border-accent);
  border-radius: var(--radius-panel); position: relative;
}
.player-hand::before {
  content: 'YOUR HAND'; position: absolute; top: -10px; left: 16px;
  font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim);
  background: var(--bg-base); padding: 0 8px; letter-spacing: 0.1em;
}

/* === HAND CARD === */
.hand-card {
  background: var(--bg-card); border: 2px solid var(--border-dim); border-radius: 10px;
  padding: 10px; width: 135px; min-height: 175px; cursor: grab;
  transition: transform 0.3s, box-shadow 0.3s; position: relative; overflow: hidden;
  aspect-ratio: 63/88; display: flex; flex-direction: column;
}
.hand-card:hover {
  transform: translateY(-16px) rotate(0deg) scale(1.05) !important;
  box-shadow: 0 12px 30px rgba(0,0,0,0.6); z-index: 10 !important;
}
.hand-card:active { cursor: grabbing; }
.hand-card.dragging { opacity: 0.4; transform: scale(0.95) !important; }
.hand-card::before {
  content: ''; position: absolute; top: -60%; left: -60%; width: 220%; height: 220%;
  background: conic-gradient(transparent, var(--hc-glow, rgba(45,212,191,0.08)), transparent 30%);
  animation: ticketShimmer 9s linear infinite; opacity: 0.3; pointer-events: none;
}

/* Rarity borders */
.hand-card[data-rarity="common"]    { border-color: rgba(90,106,128,0.4);  --hc-glow: rgba(90,106,128,0.06); }
.hand-card[data-rarity="uncommon"]  { border-color: rgba(52,211,153,0.35); --hc-glow: rgba(52,211,153,0.08); }
.hand-card[data-rarity="rare"]      { border-color: rgba(74,144,217,0.4);  --hc-glow: rgba(74,144,217,0.1); }
.hand-card[data-rarity="epic"]      { border-color: rgba(167,139,250,0.5); --hc-glow: rgba(167,139,250,0.12); }
.hand-card[data-rarity="legendary"] { border-color: rgba(245,158,11,0.5);  --hc-glow: rgba(245,158,11,0.15); }
.hand-card[data-rarity="mythic"]    { border-color: rgba(244,114,182,0.5); --hc-glow: rgba(244,114,182,0.15); }

/* Card inner structure */
.tc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.tc-ticker { font-family: var(--font-mono); font-size: 0.85rem; font-weight: 800; color: var(--accent-cyan); letter-spacing: 0.04em; }
.tc-rarity { font-size: 0.5rem; padding: 1px 5px; border-radius: 3px; font-family: var(--font-mono); font-weight: 600; text-transform: uppercase; }
.rarity-common    { background: rgba(90,106,128,0.15); color: var(--text-dim); border: 1px solid rgba(90,106,128,0.3); }
.rarity-uncommon  { background: rgba(52,211,153,0.15); color: var(--accent-green); border: 1px solid rgba(52,211,153,0.3); }
.rarity-rare      { background: rgba(74,144,217,0.15); color: var(--accent-blue); border: 1px solid rgba(74,144,217,0.3); }
.rarity-epic      { background: rgba(167,139,250,0.15); color: var(--accent-purple); border: 1px solid rgba(167,139,250,0.3); }
.rarity-legendary { background: rgba(245,158,11,0.15); color: var(--accent-amber); border: 1px solid rgba(245,158,11,0.3); }
.rarity-mythic    { background: rgba(244,114,182,0.15); color: var(--accent-pink); border: 1px solid rgba(244,114,182,0.3); }
.tc-name { font-size: 0.65rem; color: var(--text-secondary); margin-bottom: 4px; }
.tc-stat { font-size: 0.58rem; color: var(--text-dim); font-family: var(--font-mono); }
.tc-stat-val { color: var(--text-secondary); font-weight: 600; }
.tc-pnl { font-size: 0.58rem; font-family: var(--font-mono); font-weight: 600; }
.tc-pnl.positive { color: var(--accent-green); }
.tc-pnl.negative { color: var(--accent-red); }
.tc-sector { font-size: 0.5rem; color: var(--text-dim); font-family: var(--font-mono); margin-top: 2px; }
.tc-ability {
  margin-top: auto; padding: 4px 6px; font-size: 0.6rem; font-weight: 600;
  border-radius: 5px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; background: transparent; text-align: center;
}
.tc-ability:hover { filter: brightness(1.2); transform: scale(1.02); }
.tc-ability[data-ability="rally"]     { background: rgba(248,113,113,0.12); color: var(--accent-red); border: 1px solid rgba(248,113,113,0.25); }
.tc-ability[data-ability="barrier"]   { background: rgba(45,212,191,0.1); color: var(--accent-cyan); border: 1px solid rgba(45,212,191,0.25); }
.tc-ability[data-ability="lifesteal"] { background: rgba(52,211,153,0.1); color: var(--accent-green); border: 1px solid rgba(52,211,153,0.25); }
.tc-ability[data-ability="overwhelm"] { background: rgba(245,158,11,0.12); color: var(--accent-amber); border: 1px solid rgba(245,158,11,0.25); }
.tc-ability[data-ability="heal"]      { background: rgba(244,114,182,0.1); color: var(--accent-pink); border: 1px solid rgba(244,114,182,0.25); }
.tc-ability[data-ability="snipe"]     { background: rgba(74,144,217,0.1); color: var(--accent-blue); border: 1px solid rgba(74,144,217,0.25); }
.tc-ability[data-ability="burn"]      { background: rgba(251,146,60,0.12); color: var(--accent-orange); border: 1px solid rgba(251,146,60,0.25); }

/* Ability glow animation on use */
@keyframes abilityGlow {
  0%   { box-shadow: 0 0 0 0 var(--hc-glow, rgba(45,212,191,0.4)); }
  50%  { box-shadow: 0 0 20px 6px var(--hc-glow, rgba(45,212,191,0.6)); }
  100% { box-shadow: 0 0 0 0 var(--hc-glow, rgba(45,212,191,0)); }
}
.hand-card.ability-fired {
  animation: abilityGlow 0.6s ease-out;
}

@keyframes demoBob { 0%,100% { transform: var(--bob-base, none) translateY(0); } 50% { transform: var(--bob-base, none) translateY(-5px); } }

/* DEMO mode — bob animation driven by JS-set --bob-base */
[data-control="demo"] .hand-card {
  pointer-events: none; cursor: default;
}
[data-control="demo"] .hand-card.demo-bob {
  animation: demoBob var(--bob-dur, 3.5s) ease-in-out infinite var(--bob-delay, 0s);
}
[data-control="demo"] .tc-ability { cursor: default; pointer-events: none; }

/* PREVIEW mode */
[data-control="preview"] .hand-card { cursor: default; }
[data-control="preview"] .tc-ability { cursor: help; pointer-events: none; }

/* === ACCESSIBILITY: Focus visible outline (asset-specific overrides) === */
.hand-card:focus-visible {
  outline: 2px solid var(--accent-cyan);
  outline-offset: 2px;
  z-index: 10 !important;
}
.tc-ability:focus-visible {
  outline: 2px solid currentColor;
  outline-offset: 1px;
}

/* === TOUCH DRAG GHOST === */
.hand-card-ghost {
  position: fixed; pointer-events: none; z-index: 9999;
  opacity: 0.85; transform: rotate(-3deg) scale(1.08);
  box-shadow: 0 16px 40px rgba(0,0,0,0.7);
  transition: none;
}

/* === RESPONSIVE: stack at 400px === */
@media (max-width: 400px) {
  .player-hand {
    flex-direction: column; align-items: center; gap: 8px;
    padding: 30px 12px 12px;
  }
  .hand-card {
    transform: none !important;
    margin-right: 0 !important;
    z-index: auto !important;
    width: 90%; max-width: 160px;
  }
  .hand-card:hover {
    transform: translateY(-6px) scale(1.02) !important;
  }
  .hand-card.demo-bob {
    animation: none !important;
  }
}

/* === ASSET-SPECIFIC REDUCED-MOTION OVERRIDES === */
@media (prefers-reduced-motion: reduce) {
  .hand-card:hover {
    transform: translateY(-8px) scale(1.02) !important;
  }
  @keyframes demoBob { 0%,100% { transform: var(--bob-base, none); } }
}

/* Standalone layout */
.asset-showcase { padding: 24px; display: flex; justify-content: center; }
</style>
</head>
<body>
<div id="ferros-asset-root" data-control="demo">
  <div class="asset-showcase">
    <div class="player-hand" role="list" aria-label="Your hand of cards">
      <!-- Cards rendered by JS via layoutHand() -->
    </div>
  </div>
  <span class="sr-only" id="ferros-sr-announce"></span>
</div>

<script>
/* @inline _core/_runtime.js */
/* ferros-runtime v1.0.0
 *
 * Asset-side IIFE scaffold for all FERROS render assets.
 * Provides messaging, control modes, reduced-motion, accessibility, resize.
 *
 * Contract:
 *   - Assets set data-ferros-asset on <html> tag
 *   - Assets provide #ferros-asset-root element
 *   - Assets optionally define window.onFerrosInit(config) and window.onFerrosUpdate(payload)
 *   - Assets optionally provide #ferros-sr-announce element for screen-reader announcements
 *   - Runtime exposes window.ferrosRuntime namespace — assets NEVER redefine it
 *   - Runtime OWNS root.dataset.control — assets read via CSS [data-control] selectors
 *
 * See: ADR-008 (docs/adr/ADR-008-modular-rendering-system.md)
 */
(function() {
  'use strict';

  /* ═══ BOOTSTRAPPING ═══ */
  var ASSET_NAME = document.documentElement.dataset.ferrosAsset || 'unknown-asset';
  var root       = document.getElementById('ferros-asset-root');
  var isEmbedded = window.parent !== window;
  var params     = new URLSearchParams(window.location.search);
  var control    = params.get('control') || 'demo';

  /* ═══ REDUCED MOTION ═══ */
  var mql = window.matchMedia('(prefers-reduced-motion: reduce)');
  function isReducedMotion() { return mql.matches; }

  /* ═══ MESSAGING — OUTBOUND ═══ */
  function emit(event, payload) {
    var msg = {
      type: 'ferros:event',
      asset: ASSET_NAME,
      event: event,
      payload: payload
    };
    if (isEmbedded) {
      window.parent.postMessage(msg, '*');
    }
    if (root) {
      root.dispatchEvent(new CustomEvent('ferros:event', {
        detail: msg,
        bubbles: true
      }));
    }
  }

  function reportSize() {
    if (!isEmbedded || !root) return;
    window.parent.postMessage({
      type: 'ferros:resize',
      asset: ASSET_NAME,
      width: root.scrollWidth,
      height: root.scrollHeight
    }, '*');
  }

  /* ═══ MESSAGING — INBOUND ═══ */
  window.addEventListener('message', function(e) {
    if (!e.data || !e.data.type) return;

    if (e.data.type === 'ferros:init') {
      var config = e.data.config || {};
      if (config.control) control = config.control;
      applyControl();
      if (typeof window.onFerrosInit === 'function') {
        window.onFerrosInit(config);
      }
    }

    if (e.data.type === 'ferros:update') {
      /* Normalize: _embed.js wraps in e.data.payload, but some legacy
         callers put data directly on e.data. Try .payload first. */
      var payload = e.data.payload || e.data;
      if (payload.control) {
        control = payload.control;
        applyControl();
      }
      if (typeof window.onFerrosUpdate === 'function') {
        window.onFerrosUpdate(payload);
      }
    }
  });

  /* ═══ CONTROL MODES ═══ */
  function applyControl() {
    if (root) root.dataset.control = control;
  }

  /* ═══ ACCESSIBILITY ═══ */
  function announceToScreenReader(text) {
    var el = document.getElementById('ferros-sr-announce');
    if (!el) return;
    el.textContent = '';
    void el.offsetWidth; /* force reflow to re-trigger aria-live */
    el.textContent = text;
  }

  /* ═══ AUTO-INIT ═══ */
  applyControl();
  reportSize();
  if (typeof ResizeObserver !== 'undefined' && root) {
    new ResizeObserver(function() { reportSize(); }).observe(root);
  }

  /* ═══ EXPORTS ═══ */
  window.ferrosRuntime = {
    root: root,
    isEmbedded: isEmbedded,
    control: function() { return control; },
    emit: emit,
    reportSize: reportSize,
    isReducedMotion: isReducedMotion,
    announceToScreenReader: announceToScreenReader
  };
})();

/* @inline _lib/_escape-html.js */
/* ferros-escape-html v1.0.0
 *
 * XSS-safe HTML escaping via DOM textContent trick.
 *
 * Consumers: trading-card, hand-fan, deck-builder, ticket-gallery
 * See: ADR-008 (docs/adr/ADR-008-modular-rendering-system.md)
 */

function esc(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ═══════════════════════════════════════════════════════
   HAND-FAN SPECIFIC JS — card rendering, fan layout, drag
   ═══════════════════════════════════════════════════════ */
(function() {
  'use strict';

  var rt = window.ferrosRuntime;
  var hand = rt.root.querySelector('.player-hand');

  /* ── Ability emoji map ── */
  var ABILITY_ICONS = {
    rally: '\u26A1', barrier: '\uD83D\uDEE1\uFE0F', lifesteal: '\uD83D\uDC9A',
    overwhelm: '\uD83D\uDCA5', heal: '\uD83D\uDC96', snipe: '\uD83C\uDFAF',
    burn: '\uD83D\uDD25'
  };

  /* ── Rarity display labels ── */
  var RARITY_LABELS = {
    common: 'COMMON', uncommon: 'UNCOMMON', rare: 'RARE',
    epic: 'EPIC', legendary: 'LEGEND', mythic: 'MYTHIC'
  };

  /* ── Default demo cards ── */
  var defaultCards = [
    { ticker: 'TSLA', name: 'Tesla Inc.', rarity: 'epic', ability: 'rally', price: 248.50, pnl: 12.4, energy: 88, sector: 'Tech' },
    { ticker: 'META', name: 'Meta Platforms', rarity: 'rare', ability: 'barrier', price: 512.30, pnl: -3.2, energy: 71, sector: 'Tech' },
    { ticker: 'DIS', name: 'Walt Disney Co.', rarity: 'uncommon', ability: 'lifesteal', price: 98.70, pnl: 1.8, energy: 54, sector: 'Entertainment' },
    { ticker: 'AMZN', name: 'Amazon.com Inc.', rarity: 'legendary', ability: 'overwhelm', price: 187.60, pnl: 8.9, energy: 94, sector: 'Tech' }
  ];

  /* ── Current hand state ── */
  var currentCards = defaultCards.slice();

  /* ── Touch drag state ── */
  var touchState = { active: false, card: null, ghost: null, startX: 0, startY: 0 };

  /* ══════════════════════════════════════
     ferros:init / ferros:update CALLBACKS
  ══════════════════════════════════════ */
  window.onFerrosInit = function(config) {
    renderHand();
  };

  window.onFerrosUpdate = function(payload) {
    if (payload.cards && Array.isArray(payload.cards) && payload.cards.length > 0) {
      currentCards = payload.cards.slice();
      renderHand();
    }
  };

  /* ══════════════════════════════════════
     RENDER HAND — builds DOM from currentCards[]
  ══════════════════════════════════════ */
  function renderHand() {
    hand.innerHTML = '';

    currentCards.forEach(function(card, i) {
      var el = document.createElement('div');
      el.className = 'hand-card';
      el.setAttribute('data-rarity', card.rarity || 'common');
      el.setAttribute('draggable', 'true');
      el.setAttribute('data-ticker', card.ticker);
      el.setAttribute('data-index', i);
      el.setAttribute('role', 'listitem');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-grabbed', 'false');
      el.setAttribute('aria-label', card.ticker + ' ' + (card.name || '') + ', ' + (card.rarity || 'common') + ' rarity');

      el._cardData = card;

      var rarityLabel = RARITY_LABELS[card.rarity] || card.rarity.toUpperCase();
      var abilityIcon = ABILITY_ICONS[card.ability] || '\u2728';
      var pnlClass = (card.pnl >= 0) ? 'positive' : 'negative';
      var pnlSign = (card.pnl >= 0) ? '+' : '';

      el.innerHTML =
        '<div class="tc-top">' +
          '<span class="tc-ticker">' + esc(card.ticker) + '</span>' +
          '<span class="tc-rarity rarity-' + esc(card.rarity || 'common') + '">' + esc(rarityLabel) + '</span>' +
        '</div>' +
        '<div class="tc-name">' + esc(card.name || '') + '</div>' +
        (card.price != null ? '<div class="tc-stat">PRC: <span class="tc-stat-val">$' + Number(card.price).toFixed(2) + '</span></div>' : '') +
        (card.pnl != null ? '<div class="tc-pnl ' + pnlClass + '">' + pnlSign + Number(card.pnl).toFixed(1) + '%</div>' : '') +
        '<div class="tc-stat">NRG: <span class="tc-stat-val">' + (card.energy != null ? card.energy : '--') + '</span></div>' +
        (card.sector ? '<div class="tc-sector">' + esc(card.sector) + '</div>' : '') +
        '<button class="tc-ability" data-ability="' + esc(card.ability || '') + '" tabindex="0" aria-label="Use ability ' + esc(card.ability || '') + '">' +
          abilityIcon + ' ' + capitalize(card.ability || 'none') +
        '</button>';

      hand.appendChild(el);
    });

    layoutFan();
    applyModeWiring();
    rt.reportSize();
  }

  /* ══════════════════════════════════════
     DYNAMIC FAN ANGLES VIA JS
  ══════════════════════════════════════ */
  function layoutFan() {
    var cards = hand.querySelectorAll('.hand-card');
    var count = cards.length;
    if (count === 0) return;

    var isStacked = window.matchMedia('(max-width: 400px)').matches;
    var spreadDeg = Math.min(16, 60 / count);

    cards.forEach(function(card, i) {
      if (isStacked) {
        card.style.transform = '';
        card.style.zIndex = '';
        card.style.marginRight = '';
        card.style.setProperty('--bob-base', 'none');
        return;
      }

      var angle = (i - (count - 1) / 2) * spreadDeg;
      var distFromCenter = Math.abs(i - (count - 1) / 2);
      var yOffset = distFromCenter * distFromCenter * 2;
      var zIdx = count - Math.round(distFromCenter);
      var margin = (i < count - 1) ? -12 : 0;

      card.style.transform = 'rotate(' + angle.toFixed(1) + 'deg) translateY(' + yOffset.toFixed(1) + 'px)';
      card.style.zIndex = zIdx;
      card.style.marginRight = margin + 'px';

      card.style.setProperty('--bob-base', 'rotate(' + angle.toFixed(1) + 'deg) translateY(' + yOffset.toFixed(1) + 'px)');
      card.style.setProperty('--bob-dur', (3.2 + i * 0.3) + 's');
      card.style.setProperty('--bob-delay', (i * 0.3) + 's');
    });
  }

  window.addEventListener('resize', layoutFan);

  /* ══════════════════════════════════════
     MODE WIRING
  ══════════════════════════════════════ */
  function applyModeWiring() {
    var cards = hand.querySelectorAll('.hand-card');
    var c = rt.control();

    if (c === 'demo') {
      cards.forEach(function(card) { card.classList.add('demo-bob'); });
    }

    if (c === 'play') {
      initDrag();
      initTouchDrag();
      initAbilityButtons();
      initKeyboardDrag();
    }
  }

  /* ══════════════════════════════════════
     ABILITY BUTTON CLICK HANDLERS (PLAY mode)
  ══════════════════════════════════════ */
  function initAbilityButtons() {
    var buttons = hand.querySelectorAll('.tc-ability');
    buttons.forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var card = btn.closest('.hand-card');
        if (!card) return;
        var cardData = card._cardData || {};

        card.classList.remove('ability-fired');
        void card.offsetWidth;
        card.classList.add('ability-fired');
        card.addEventListener('animationend', function onEnd() {
          card.classList.remove('ability-fired');
          card.removeEventListener('animationend', onEnd);
        });

        rt.emit('ability-used', {
          ticker: cardData.ticker || card.dataset.ticker,
          ability: btn.dataset.ability
        });
      });
    });
  }

  /* ══════════════════════════════════════
     MOUSE DRAG
  ══════════════════════════════════════ */
  function initDrag() {
    var cards = hand.querySelectorAll('.hand-card');
    cards.forEach(function(card) {
      card.addEventListener('dragstart', function(e) {
        card.classList.add('dragging');
        card.setAttribute('aria-grabbed', 'true');
        var data = card._cardData || {};
        e.dataTransfer.setData('text/plain', JSON.stringify(data));
        e.dataTransfer.setData('application/x-ferros-card', JSON.stringify(data));
        e.dataTransfer.effectAllowed = 'move';
        rt.emit('card-dragged', { ticker: data.ticker || card.dataset.ticker, action: 'start' });
      });

      card.addEventListener('dragend', function(e) {
        card.classList.remove('dragging');
        card.setAttribute('aria-grabbed', 'false');
        var data = card._cardData || {};

        if (e.dataTransfer.dropEffect === 'move') {
          rt.emit('card-played', {
            ticker: data.ticker, name: data.name, rarity: data.rarity,
            ability: data.ability, price: data.price, pnl: data.pnl,
            energy: data.energy, sector: data.sector
          });
        } else {
          rt.emit('card-dragged', { ticker: data.ticker || card.dataset.ticker, action: 'end' });
        }
      });
    });
  }

  /* ══════════════════════════════════════
     TOUCH DRAG
  ══════════════════════════════════════ */
  function initTouchDrag() {
    var cards = hand.querySelectorAll('.hand-card');
    cards.forEach(function(card) {
      card.addEventListener('touchstart', onTouchStart, { passive: false });
    });
  }

  function onTouchStart(e) {
    if (rt.control() !== 'play') return;
    var card = e.currentTarget;
    var touch = e.touches[0];

    touchState.active = true;
    touchState.card = card;
    touchState.startX = touch.clientX;
    touchState.startY = touch.clientY;

    var ghost = card.cloneNode(true);
    ghost.className = 'hand-card hand-card-ghost';
    ghost.setAttribute('data-rarity', card.dataset.rarity);
    ghost.style.width = card.offsetWidth + 'px';
    ghost.style.height = card.offsetHeight + 'px';
    ghost.style.left = (touch.clientX - card.offsetWidth / 2) + 'px';
    ghost.style.top = (touch.clientY - card.offsetHeight / 2) + 'px';
    document.body.appendChild(ghost);
    touchState.ghost = ghost;

    card.classList.add('dragging');
    card.setAttribute('aria-grabbed', 'true');

    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onTouchEnd, { passive: false });
    document.addEventListener('touchcancel', onTouchEnd, { passive: false });

    e.preventDefault();
  }

  function onTouchMove(e) {
    if (!touchState.active || !touchState.ghost) return;
    var touch = e.touches[0];
    touchState.ghost.style.left = (touch.clientX - touchState.ghost.offsetWidth / 2) + 'px';
    touchState.ghost.style.top = (touch.clientY - touchState.ghost.offsetHeight / 2) + 'px';
    e.preventDefault();
  }

  function onTouchEnd(e) {
    if (!touchState.active) return;

    var card = touchState.card;
    var data = card ? (card._cardData || {}) : {};

    var endTouch = (e.changedTouches && e.changedTouches[0]) || null;
    var dropX = endTouch ? endTouch.clientX : 0;
    var dropY = endTouch ? endTouch.clientY : 0;

    if (touchState.ghost && touchState.ghost.parentNode) {
      touchState.ghost.parentNode.removeChild(touchState.ghost);
    }

    if (card) {
      card.classList.remove('dragging');
      card.setAttribute('aria-grabbed', 'false');
    }

    var dropTarget = endTouch ? document.elementFromPoint(dropX, dropY) : null;
    var isValidDrop = dropTarget && (
      dropTarget.hasAttribute('data-drop-zone') ||
      dropTarget.closest('[data-drop-zone]') ||
      (dropTarget !== hand && !hand.contains(dropTarget))
    );

    var dx = dropX - touchState.startX;
    var dy = dropY - touchState.startY;
    var dragDistance = Math.sqrt(dx * dx + dy * dy);

    if (isValidDrop && dragDistance > 30) {
      rt.emit('card-played', {
        ticker: data.ticker, name: data.name, rarity: data.rarity,
        ability: data.ability, price: data.price, pnl: data.pnl,
        energy: data.energy, sector: data.sector,
        dropX: dropX, dropY: dropY
      });
    }

    touchState.active = false;
    touchState.card = null;
    touchState.ghost = null;

    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onTouchEnd);
    document.removeEventListener('touchcancel', onTouchEnd);
  }

  /* ══════════════════════════════════════
     KEYBOARD DRAG INITIATION
  ══════════════════════════════════════ */
  var keyboardDragCard = null;

  function initKeyboardDrag() {
    hand.addEventListener('keydown', function(e) {
      var card = e.target.closest('.hand-card');
      if (!card) return;

      if ((e.key === 'Enter' || e.key === ' ') && !e.target.classList.contains('tc-ability')) {
        e.preventDefault();
        if (keyboardDragCard === card) {
          var data = card._cardData || {};
          card.classList.remove('dragging');
          card.setAttribute('aria-grabbed', 'false');
          rt.emit('card-played', {
            ticker: data.ticker, name: data.name, rarity: data.rarity,
            ability: data.ability, price: data.price, pnl: data.pnl,
            energy: data.energy, sector: data.sector
          });
          keyboardDragCard = null;
        } else {
          if (keyboardDragCard) {
            keyboardDragCard.classList.remove('dragging');
            keyboardDragCard.setAttribute('aria-grabbed', 'false');
          }
          keyboardDragCard = card;
          card.classList.add('dragging');
          card.setAttribute('aria-grabbed', 'true');
        }
      }

      if (e.key === 'Escape' && keyboardDragCard) {
        keyboardDragCard.classList.remove('dragging');
        keyboardDragCard.setAttribute('aria-grabbed', 'false');
        keyboardDragCard = null;
      }
    });
  }

  /* ══════════════════════════════════════
     UTILITIES
  ══════════════════════════════════════ */
  function capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  /* ══════════════════════════════════════
     INIT
  ══════════════════════════════════════ */
  renderHand();
})();
</script>
</body>
</html>
