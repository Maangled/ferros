<!DOCTYPE html>
<html lang="en" data-ferros-asset="hero-card-fan" data-version="3.0.0">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FERROS Asset: Hero Card Fan</title>
<!--
  ╔══════════════════════════════════════════════════╗
  ║  FERROS ASSET: hero-card-fan  v3.0.0             ║
  ║  Modules: _tokens, _core/_a11y, _core/_runtime   ║
  ║  Control Levels: DEMO | PREVIEW | PLAY           ║
  ║  6-card navigation fan with 3D flip on hover     ║
  ║  Tap-to-flip, keyboard nav, dynamic rendering    ║
  ║  @inline _tokens.css                             ║
  ║  @inline _core/_a11y.css                         ║
  ║  @inline _core/_runtime.js                       ║
  ╚══════════════════════════════════════════════════╝
-->
<style>
/* @inline _tokens.css */
/* ferros-tokens v2.0.0
 *
 * FERROS Design Tokens — single canonical source
 * All 16 render assets inline this file via @inline marker.
 * Assets may override any token by redefining in their own :root block.
 *
 * Consumers: all asset HTML files under docs/assets/
 * NOT used by: schedule-ledger.html (different design system)
 *
 * v2.0.0 — absorb rarity + stage tokens from asset copies (ADR-008)
 * v1.0.0 — initial token set (6 dark-theme pages)
 */
:root {
  /* === Backgrounds === */
  --bg-base:        #0a0c10;
  --bg-panel:       #111520;
  --bg-card:        #161b28;
  --bg-card-alt:    #1a2035;
  --bg-highlight:   #1e2840;

  /* === Borders === */
  --border-dim:     #1e2a3a;
  --border-accent:  #2a3f5f;
  --border-bright:  #3a5a8f;

  /* === Text === */
  --text-primary:   #e8edf5;
  --text-secondary: #8fa0b8;
  --text-dim:       #5a6a80;
  --text-code:      #7eb8e8;

  /* === Accents === */
  --accent-blue:    #4a90d9;
  --accent-cyan:    #2dd4bf;
  --accent-green:   #34d399;
  --accent-amber:   #f59e0b;
  --accent-red:     #f87171;
  --accent-purple:  #a78bfa;
  --accent-pink:    #f472b6;
  --accent-orange:  #fb923c;

  /* === Rarity System === */
  --rarity-common:    #5a6a80;
  --rarity-uncommon:  #34d399;
  --rarity-rare:      #4a90d9;
  --rarity-epic:      #a78bfa;
  --rarity-legendary: #f59e0b;
  --rarity-mythic:    #f472b6;

  /* === Stage / 3D Scene === */
  --stage-grid-major: rgba(74,144,217, 0.10);
  --stage-grid-minor: rgba(74,144,217, 0.03);
  --stage-fog-color:  var(--bg-base);

  /* === Gradients === */
  --gradient-header: linear-gradient(135deg, #0d1b35 0%, #0a1525 50%, #091020 100%);
  --gradient-card:   linear-gradient(145deg, #161b28 0%, #111520 100%);
  --gradient-accent: linear-gradient(90deg, #4a90d9 0%, #2dd4bf 100%);

  /* === Shadows === */
  --shadow-panel:  0 4px 24px rgba(0, 0, 0, 0.6);
  --shadow-card:   0 2px 12px rgba(0, 0, 0, 0.4);
  --shadow-glow:   0 0 12px rgba(74,144,217,.35);

  /* === Radii === */
  --radius-panel:  12px;
  --radius-card:   8px;
  --radius-badge:  4px;

  /* === Typography === */
  --font-mono: 'Courier New', Courier, monospace;
}

/* @inline _core/_a11y.css */
/* ferros-a11y v1.0.0
 *
 * Accessibility CSS primitives for all FERROS render assets.
 * Provides: .sr-only, :focus-visible base, prefers-reduced-motion reset.
 *
 * See: ADR-008 (docs/adr/ADR-008-modular-rendering-system.md)
 */

/* Screen-reader-only text */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* Focus-visible baseline — assets can override with higher-specificity selectors */
:focus-visible {
  outline: 2px solid var(--accent-cyan, #2dd4bf);
  outline-offset: 2px;
}

/* Reduced-motion: kill all animation globally, assets layer their own overrides on top */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-base); color: var(--text-primary); }

/* === CARD FAN LAYOUT === */
.hero-fan-container {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  padding: 60px 24px 40px;
  min-height: 360px;
  perspective: 1200px;
}

/* === HERO FLIP CARD === */
.hero-flip-card {
  width: 120px; height: 170px;
  perspective: 600px;
  cursor: pointer;
  position: relative;
  transition: transform 0.4s, margin 0.3s;
  transform-origin: bottom center;
  margin-right: -20px;
  outline: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.hero-flip-card:last-child {
  margin-right: 0;
}

/* Hover lift — non-touch override only */
.hero-flip-card:hover {
  z-index: 10 !important;
  transform: rotate(0deg) translateY(-20px) scale(1.08) !important;
}

/* === ACTIVE / SELECTED STATE === */
.hero-flip-card.hfc-active {
  transform: scale(1.05) !important;
}
.hero-flip-card.hfc-active .hfc-front {
  border-color: var(--accent-cyan) !important;
  border-width: 3px;
  box-shadow: 0 0 16px rgba(45,212,191,0.5), 0 0 32px rgba(45,212,191,0.2);
}
.hero-flip-card.hfc-active:hover {
  transform: rotate(0deg) translateY(-20px) scale(1.12) !important;
}

/* === FOCUS-VISIBLE (Keyboard Nav — asset-specific override) === */
.hero-flip-card:focus-visible {
  outline: 2px solid var(--accent-cyan);
  outline-offset: 2px;
  z-index: 10 !important;
}

/* === 3D FLIP INNER === */
.hfc-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}
/* Hover flip (non-touch supplementary) */
.hero-flip-card:hover .hfc-inner {
  transform: rotateY(180deg);
}
/* Tap/click flip (persistent toggle) */
.hero-flip-card.flipped .hfc-inner {
  transform: rotateY(180deg);
}

/* === CARD FACES === */
.hfc-front, .hfc-back {
  position: absolute;
  width: 100%; height: 100%;
  backface-visibility: hidden;
  border-radius: var(--radius-card);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 8px;
  overflow: hidden;
}
.hfc-front {
  background: var(--gradient-card);
  border: 2px solid var(--border-dim);
}
.hfc-front::before {
  content: '';
  position: absolute;
  top: -60%; left: -60%;
  width: 220%; height: 220%;
  background: conic-gradient(transparent, var(--hfc-glow, transparent), transparent 30%);
  animation: hfcShimmer 7s linear infinite;
  opacity: 0.5;
  pointer-events: none;
}

/* === RARITY BORDERS + GLOW === */
.hfc-epic .hfc-front    { border-color: rgba(167,139,250,0.5); --hfc-glow: rgba(167,139,250,0.12); }
.hfc-rare .hfc-front     { border-color: rgba(74,144,217,0.45); --hfc-glow: rgba(74,144,217,0.1); }
.hfc-common .hfc-front   { border-color: rgba(90,106,128,0.35); --hfc-glow: rgba(90,106,128,0.06); }
.hfc-uncommon .hfc-front { border-color: rgba(52,211,153,0.4); --hfc-glow: rgba(52,211,153,0.08); }
.hfc-legendary .hfc-front { border-color: rgba(245,158,11,0.5); --hfc-glow: rgba(245,158,11,0.15); }
.hfc-mythic .hfc-front   { border-color: rgba(244,114,182,0.5); --hfc-glow: rgba(244,114,182,0.15); }

/* === BACK FACE (monster card style) === */
.hfc-back {
  background: var(--gradient-header);
  border: 2px solid var(--border-accent);
  transform: rotateY(180deg);
  position: relative;
}
/* Hatching pattern */
.hfc-back::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid rgba(74,144,217,0.15);
  border-radius: calc(var(--radius-card) - 4px);
  background:
    repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(74,144,217,0.03) 4px, rgba(74,144,217,0.03) 5px),
    repeating-linear-gradient(-45deg, transparent, transparent 4px, rgba(74,144,217,0.03) 4px, rgba(74,144,217,0.03) 5px);
  pointer-events: none;
}
.hfc-back-crest {
  font-size: 2.4rem;
  margin-bottom: 8px;
  position: relative; z-index: 1;
}
.hfc-back-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.15em;
  color: var(--accent-blue);
  text-transform: uppercase;
  position: relative; z-index: 1;
}

/* === FRONT CONTENT === */
.hfc-rarity-badge {
  font-size: 0.5rem; font-family: var(--font-mono); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  padding: 1px 6px; border-radius: var(--radius-badge);
  margin-bottom: 8px;
  position: relative; z-index: 1;
}
.hfc-epic .hfc-rarity-badge    { background: rgba(167,139,250,0.15); color: var(--accent-purple); border: 1px solid rgba(167,139,250,0.3); }
.hfc-rare .hfc-rarity-badge     { background: rgba(74,144,217,0.15); color: var(--accent-blue); border: 1px solid rgba(74,144,217,0.3); }
.hfc-common .hfc-rarity-badge   { background: rgba(90,106,128,0.2); color: var(--text-dim); border: 1px solid rgba(90,106,128,0.3); }
.hfc-uncommon .hfc-rarity-badge { background: rgba(52,211,153,0.15); color: var(--accent-green); border: 1px solid rgba(52,211,153,0.3); }
.hfc-legendary .hfc-rarity-badge { background: rgba(245,158,11,0.15); color: var(--accent-amber); border: 1px solid rgba(245,158,11,0.3); }
.hfc-mythic .hfc-rarity-badge   { background: rgba(244,114,182,0.15); color: var(--accent-pink); border: 1px solid rgba(244,114,182,0.3); }

.hfc-icon {
  font-size: 2rem;
  margin-bottom: 8px;
  position: relative; z-index: 1;
}
.hfc-label {
  font-size: 0.62rem; font-weight: 700;
  text-align: center;
  color: var(--text-secondary);
  line-height: 1.3;
  position: relative; z-index: 1;
}

/* === KEYFRAMES === */
@keyframes hfcFloat {
  0%, 100% { translate: 0 0; }
  50%      { translate: 0 -6px; }
}
@keyframes hfcPulse {
  0%, 100% { filter: drop-shadow(0 0 4px transparent); }
  50%      { filter: drop-shadow(0 0 12px var(--hfc-glow, rgba(245,158,11,0.3))); }
}
@keyframes hfcTilt {
  0%, 100% { transform: rotate(15deg); }
  25%      { transform: rotate(16deg); }
  75%      { transform: rotate(14deg); }
}
@keyframes hfcShimmer { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* === PREFERS-REDUCED-MOTION (asset-specific) === */
@media (prefers-reduced-motion: reduce) {
  .hfc-front::before {
    animation: none !important;
    opacity: 0 !important;
  }
}
</style>
</head>
<body>
<div id="ferros-asset-root" data-control="demo">
  <span class="sr-only" id="ferros-sr-announce"></span>
  <div class="hero-fan-container" role="navigation" aria-label="FERROS section navigation">
    <!-- Cards rendered dynamically by JS -->
  </div>
</div>

<script>
/* @inline _core/_runtime.js */
/* ferros-runtime v1.0.0
 *
 * Asset-side IIFE scaffold for all FERROS render assets.
 * Provides messaging, control modes, reduced-motion, accessibility, resize.
 *
 * Contract:
 *   - Assets set data-ferros-asset on <html> tag
 *   - Assets provide #ferros-asset-root element
 *   - Assets optionally define window.onFerrosInit(config) and window.onFerrosUpdate(payload)
 *   - Assets optionally provide #ferros-sr-announce element for screen-reader announcements
 *   - Runtime exposes window.ferrosRuntime namespace — assets NEVER redefine it
 *   - Runtime OWNS root.dataset.control — assets read via CSS [data-control] selectors
 *
 * See: ADR-008 (docs/adr/ADR-008-modular-rendering-system.md)
 */
(function() {
  'use strict';

  /* ═══ BOOTSTRAPPING ═══ */
  var ASSET_NAME = document.documentElement.dataset.ferrosAsset || 'unknown-asset';
  var root       = document.getElementById('ferros-asset-root');
  var isEmbedded = window.parent !== window;
  var params     = new URLSearchParams(window.location.search);
  var control    = params.get('control') || 'demo';

  /* ═══ REDUCED MOTION ═══ */
  var mql = window.matchMedia('(prefers-reduced-motion: reduce)');
  function isReducedMotion() { return mql.matches; }

  /* ═══ MESSAGING — OUTBOUND ═══ */
  function emit(event, payload) {
    var msg = {
      type: 'ferros:event',
      asset: ASSET_NAME,
      event: event,
      payload: payload
    };
    if (isEmbedded) {
      window.parent.postMessage(msg, '*');
    }
    if (root) {
      root.dispatchEvent(new CustomEvent('ferros:event', {
        detail: msg,
        bubbles: true
      }));
    }
  }

  function reportSize() {
    if (!isEmbedded || !root) return;
    window.parent.postMessage({
      type: 'ferros:resize',
      asset: ASSET_NAME,
      width: root.scrollWidth,
      height: root.scrollHeight
    }, '*');
  }

  /* ═══ MESSAGING — INBOUND ═══ */
  window.addEventListener('message', function(e) {
    if (!e.data || !e.data.type) return;

    if (e.data.type === 'ferros:init') {
      var config = e.data.config || {};
      if (config.control) control = config.control;
      applyControl();
      if (typeof window.onFerrosInit === 'function') {
        window.onFerrosInit(config);
      }
    }

    if (e.data.type === 'ferros:update') {
      /* Normalize: _embed.js wraps in e.data.payload, but some legacy
         callers put data directly on e.data. Try .payload first. */
      var payload = e.data.payload || e.data;
      if (payload.control) {
        control = payload.control;
        applyControl();
      }
      if (typeof window.onFerrosUpdate === 'function') {
        window.onFerrosUpdate(payload);
      }
    }
  });

  /* ═══ CONTROL MODES ═══ */
  function applyControl() {
    if (root) root.dataset.control = control;
  }

  /* ═══ ACCESSIBILITY ═══ */
  function announceToScreenReader(text) {
    var el = document.getElementById('ferros-sr-announce');
    if (!el) return;
    el.textContent = '';
    void el.offsetWidth; /* force reflow to re-trigger aria-live */
    el.textContent = text;
  }

  /* ═══ AUTO-INIT ═══ */
  applyControl();
  reportSize();
  if (typeof ResizeObserver !== 'undefined' && root) {
    new ResizeObserver(function() { reportSize(); }).observe(root);
  }

  /* ═══ EXPORTS ═══ */
  window.ferrosRuntime = {
    root: root,
    isEmbedded: isEmbedded,
    control: function() { return control; },
    emit: emit,
    reportSize: reportSize,
    isReducedMotion: isReducedMotion,
    announceToScreenReader: announceToScreenReader
  };
})();

  /* === DEFAULT CARD DATA === */
  var defaultCards = [
    { icon: '\uD83C\uDCCF', label: 'Card-Based\nTrading',    rarity: 'epic',      target: 'card-trading' },
    { icon: '\uD83E\uDD16', label: 'AI\nAgents',             rarity: 'rare',       target: 'ai-agents' },
    { icon: '\uD83C\uDF81', label: 'Loot\nRewards',          rarity: 'common',     target: 'loot-rewards' },
    { icon: '\uD83D\uDCCA', label: 'Idle\nEarnings',         rarity: 'uncommon',   target: 'idle-earnings' },
    { icon: '\uD83E\uDDEC', label: 'Genesis\nCreatures',     rarity: 'legendary',  target: 'genesis-creatures' },
    { icon: '\uD83D\uDD13', label: 'Open\nSource',           rarity: 'mythic',     target: 'open-source' }
  ];

  var currentCards = defaultCards;

  /* === ACTIVE SECTION === */
  function setActiveSection(section) {
    activeSection = section;
    var cards = container.querySelectorAll('.hero-flip-card');
    for (var i = 0; i < cards.length; i++) {
      var card = cards[i];
      if (card.dataset.target === section) {
        card.classList.add('hfc-active');
      } else {
        card.classList.remove('hfc-active');
      }
    }
  }

  /* === DYNAMIC FAN ANGLES === */
  function computeFanLayout() {
    var cards = container.querySelectorAll('.hero-flip-card');
    var count = cards.length;
    if (count === 0) return;

    for (var i = 0; i < count; i++) {
      var angle = (i - (count - 1) / 2) * spreadDeg;
      var distFromCenter = Math.abs(i - (count - 1) / 2);
      var maxDist = (count - 1) / 2;
      /* Center cards get higher z-index */
      var zIndex = Math.round((maxDist - distFromCenter + 1) * 2);
      /* Float animation delay staggered per card */
      var floatDelay = (i * 0.3) + 's';

      cards[i].style.transform = 'rotate(' + angle + 'deg)';
      cards[i].style.zIndex = zIndex;
      cards[i].dataset.baseRotation = angle;
      cards[i].dataset.baseZIndex = zIndex;

      /* Apply float animation unless reduced motion */
      if (!rt.isReducedMotion()) {
        applyAnimations(cards[i], floatDelay);
      }
    }
  }

  /* Apply rarity-specific animations to a card */
  function applyAnimations(cardEl, floatDelay) {
    var rarity = cardEl.dataset.rarity || '';
    if (rarity === 'legendary') {
      cardEl.style.animation = 'hfcPulse 3s ease-in-out infinite, hfcFloat 4s ease-in-out infinite ' + floatDelay;
    } else if (rarity === 'epic') {
      cardEl.style.animation = 'hfcPulse 3.5s ease-in-out infinite, hfcFloat 4s ease-in-out infinite ' + floatDelay;
    } else if (rarity === 'mythic') {
      cardEl.style.animation = 'hfcTilt 4s ease-in-out infinite, hfcFloat 4s ease-in-out infinite ' + floatDelay;
    } else {
      cardEl.style.animation = 'hfcFloat 4s ease-in-out infinite ' + floatDelay;
    }
  }

  /* === RENDER FAN FROM DATA === */
  function renderFan(cards) {
    /* Clear existing cards */
    container.innerHTML = '';

    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      var labelHtml = c.label.replace(/\n/g, '<br>');
      var ariaText = 'Navigate to ' + c.label.replace(/\n/g, ' ') + ', ' + c.rarity + ' rarity';

      /* Build card element — using div, not <a> */
      var card = document.createElement('div');
      card.className = 'hero-flip-card hfc-' + c.rarity;
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', ariaText);
      card.dataset.target = c.target;
      card.dataset.rarity = c.rarity;

      /* Inner 3D flip wrapper */
      var inner = document.createElement('div');
      inner.className = 'hfc-inner';

      /* Front face */
      var front = document.createElement('div');
      front.className = 'hfc-front';

      var badge = document.createElement('div');
      badge.className = 'hfc-rarity-badge';
      badge.textContent = c.rarity.toUpperCase();

      var icon = document.createElement('div');
      icon.className = 'hfc-icon';
      icon.textContent = c.icon;

      var label = document.createElement('div');
      label.className = 'hfc-label';
      label.innerHTML = labelHtml;

      front.appendChild(badge);
      front.appendChild(icon);
      front.appendChild(label);

      /* Back face */
      var back = document.createElement('div');
      back.className = 'hfc-back';

      var crest = document.createElement('div');
      crest.className = 'hfc-back-crest';
      crest.textContent = '\u2694\uFE0F';

      var backLabel = document.createElement('div');
      backLabel.className = 'hfc-back-label';
      backLabel.textContent = 'FERROS';

      back.appendChild(crest);
      back.appendChild(backLabel);

      /* Assemble */
      inner.appendChild(front);
      inner.appendChild(back);
      card.appendChild(inner);
      container.appendChild(card);

      /* Bind events */
      bindCardEvents(card);
    }

    /* Compute fan layout angles */
    computeFanLayout();

    /* Restore active section highlight if set */
    if (activeSection) {
      setActiveSection(activeSection);
    }

    /* Report new size */
    rt.reportSize();

    /* Emit fan-updated event */
    rt.emit('fan-updated', { cardCount: cards.length });
  }

  /* === CARD EVENT HANDLERS === */
  function bindCardEvents(card) {
    /* Click/tap handler: toggles flip + navigates in PLAY mode */
    card.addEventListener('click', function(e) {
      e.preventDefault();
      handleCardActivation(card);
    });

    /* Keyboard: Enter or Space */
    card.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handleCardActivation(card);
      }
    });

    /* On hover end, restore base transform (since hover override uses !important,
       this handles re-setting the z-index after mouse leaves) */
    card.addEventListener('mouseleave', function() {
      var baseZ = card.dataset.baseZIndex;
      if (!card.classList.contains('hfc-active')) {
        card.style.zIndex = baseZ;
      }
    });
  }

  function handleCardActivation(card) {
    var target = card.dataset.target;

    /* Toggle flip class (tap-to-flip for all modes) */
    card.classList.toggle('flipped');

    /* In PLAY mode, emit navigation event */
    if (rt.control() === 'play') {
      rt.emit('navigate', { section: target });
      setActiveSection(target);
    }
    /* In DEMO/PREVIEW mode, only flip — no navigation */
  }

  /* === RESIZE HANDLER === */
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      computeFanLayout();
    }, 100);
  });

  /* === REDUCED MOTION LISTENER === */
  if (window.matchMedia) {
    var motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    var handleMotionChange = function() {
      computeFanLayout();
    };
    /* Support both addEventListener and deprecated addListener */
    if (motionQuery.addEventListener) {
      motionQuery.addEventListener('change', handleMotionChange);
    } else if (motionQuery.addListener) {
      motionQuery.addListener(handleMotionChange);
    }
  }

  /* =========================================================
   *  FERROS CALLBACKS
   * ========================================================= */
  window.onFerrosInit = function(config) {
    /* Re-render fan on init in case control changed */
    renderFan(currentCards);
  };

  window.onFerrosUpdate = function(payload) {
    /* Accept new card data to re-render the fan */
    if (payload.cards && Array.isArray(payload.cards)) {
      currentCards = payload.cards;
      renderFan(currentCards);
    }

    /* Accept active section highlight */
    if (typeof payload.activeSection === 'string') {
      setActiveSection(payload.activeSection);
    }
  };

  /* === INIT === */
  renderFan(currentCards);
})();
</script>
</body>
</html>
