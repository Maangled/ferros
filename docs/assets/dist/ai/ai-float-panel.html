<style>
/* @inline _tokens.css */
/* ferros-tokens v2.0.0
 *
 * FERROS Design Tokens — single canonical source
 * All 16 render assets inline this file via @inline marker.
 * Assets may override any token by redefining in their own :root block.
 *
 * Consumers: all asset HTML files under docs/assets/
 * NOT used by: schedule-ledger.html (different design system)
 *
 * v2.0.0 — absorb rarity + stage tokens from asset copies (ADR-008)
 * v1.0.0 — initial token set (6 dark-theme pages)
 */
:root {
  /* === Backgrounds === */
  --bg-base:        #0a0c10;
  --bg-panel:       #111520;
  --bg-card:        #161b28;
  --bg-card-alt:    #1a2035;
  --bg-highlight:   #1e2840;

  /* === Borders === */
  --border-dim:     #1e2a3a;
  --border-accent:  #2a3f5f;
  --border-bright:  #3a5a8f;

  /* === Text === */
  --text-primary:   #e8edf5;
  --text-secondary: #8fa0b8;
  --text-dim:       #5a6a80;
  --text-code:      #7eb8e8;

  /* === Accents === */
  --accent-blue:    #4a90d9;
  --accent-cyan:    #2dd4bf;
  --accent-green:   #34d399;
  --accent-amber:   #f59e0b;
  --accent-red:     #f87171;
  --accent-purple:  #a78bfa;
  --accent-pink:    #f472b6;
  --accent-orange:  #fb923c;

  /* === Rarity System === */
  --rarity-common:    #5a6a80;
  --rarity-uncommon:  #34d399;
  --rarity-rare:      #4a90d9;
  --rarity-epic:      #a78bfa;
  --rarity-legendary: #f59e0b;
  --rarity-mythic:    #f472b6;

  /* === Stage / 3D Scene === */
  --stage-grid-major: rgba(74,144,217, 0.10);
  --stage-grid-minor: rgba(74,144,217, 0.03);
  --stage-fog-color:  var(--bg-base);

  /* === Gradients === */
  --gradient-header: linear-gradient(135deg, #0d1b35 0%, #0a1525 50%, #091020 100%);
  --gradient-card:   linear-gradient(145deg, #161b28 0%, #111520 100%);
  --gradient-accent: linear-gradient(90deg, #4a90d9 0%, #2dd4bf 100%);

  /* === Shadows === */
  --shadow-panel:  0 4px 24px rgba(0, 0, 0, 0.6);
  --shadow-card:   0 2px 12px rgba(0, 0, 0, 0.4);
  --shadow-glow:   0 0 12px rgba(74,144,217,.35);

  /* === Radii === */
  --radius-panel:  12px;
  --radius-card:   8px;
  --radius-badge:  4px;

  /* === Typography === */
  --font-mono: 'Courier New', Courier, monospace;
}

/* @inline _core/_a11y.css */
/* ferros-a11y v1.0.0
 *
 * Accessibility CSS primitives for all FERROS render assets.
 * Provides: .sr-only, :focus-visible base, prefers-reduced-motion reset.
 *
 * See: ADR-008 (docs/adr/ADR-008-modular-rendering-system.md)
 */

/* Screen-reader-only text */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* Focus-visible baseline — assets can override with higher-specificity selectors */
:focus-visible {
  outline: 2px solid var(--accent-cyan, #2dd4bf);
  outline-offset: 2px;
}

/* Reduced-motion: kill all animation globally, assets layer their own overrides on top */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-base); color: var(--text-primary); min-height: 100vh; }

/* === AI FLOAT BUTTON === */
.ai-float-btn {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--gradient-accent);
  border: 2px solid rgba(45,212,191,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  cursor: pointer;
  z-index: 1000;
  box-shadow: var(--shadow-panel);
  transition: transform 0.3s, box-shadow 0.3s;
  animation: aiGlow 3s ease-in-out infinite;
}
.ai-float-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 24px rgba(45,212,191,0.4);
}
.ai-float-btn.hidden { display: none; }

@keyframes aiGlow {
  0%, 100% { box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 8px rgba(45,212,191,0.2); }
  50%      { box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 20px rgba(45,212,191,0.4); }
}

/* === AI FLOAT PANEL === */
.ai-float-panel {
  position: fixed;
  bottom: 90px; right: 24px;
  width: 340px;
  max-height: 480px;
  background: var(--bg-panel);
  border: 2px solid var(--border-accent);
  border-radius: var(--radius-panel);
  box-shadow: var(--shadow-panel);
  z-index: 999;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: translateY(20px) scale(0.95);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.3s, opacity 0.3s;
}
.ai-float-panel.open {
  transform: translateY(0) scale(1);
  opacity: 1;
  pointer-events: all;
}

/* Panel Header */
.ai-float-header {
  padding: 14px 16px;
  background: var(--gradient-header);
  border-bottom: 1px solid var(--border-dim);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.ai-float-title {
  font-size: 0.82rem; font-weight: 700;
  color: var(--text-primary);
}
.ai-header-actions {
  display: flex; align-items: center; gap: 6px;
}
.ai-float-header-btn {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--bg-highlight);
  border: 1px solid var(--border-dim);
  color: var(--text-dim);
  font-size: 0.7rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  line-height: 1;
}
.ai-float-header-btn:hover { color: var(--text-primary); border-color: var(--border-accent); }
.ai-float-close:hover { color: var(--accent-red); border-color: rgba(248,113,113,0.3); }

/* === AGENT STATUS DOT === */
.ai-agent-status {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent-green);
  flex-shrink: 0;
}
.ai-agent-status.active {
  background: var(--accent-cyan);
}

@keyframes statusPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
[data-control="preview"] .ai-agent-status {
  animation: statusPulse 2.5s ease-in-out infinite;
}

/* === AGENT MENU === */
.ai-float-menu {
  padding: 10px;
  overflow-y: auto;
  flex: 1;
}
.ai-float-agent {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-card);
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  border: 1px solid transparent;
  margin-bottom: 4px;
  position: relative;
}
.ai-float-agent:hover {
  background: var(--bg-highlight);
  border-color: var(--border-dim);
}
.ai-float-agent-icon { font-size: 1.4rem; position: relative; }
.ai-float-agent-info { flex: 1; min-width: 0; }
.ai-float-agent-name {
  font-size: 0.75rem; font-weight: 700;
  color: var(--text-primary);
}
.ai-float-agent-role {
  font-size: 0.62rem; color: var(--text-dim);
}
.ai-float-agent-arrow {
  font-size: 0.7rem; color: var(--text-dim);
}

/* Agent description tooltip (PREVIEW mode) */
.ai-float-agent[data-desc]:hover::after {
  content: attr(data-desc);
  position: absolute;
  bottom: calc(100% + 6px); left: 12px; right: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border-accent);
  border-radius: var(--radius-badge);
  padding: 6px 8px;
  font-size: 0.62rem; color: var(--text-secondary);
  line-height: 1.4;
  z-index: 10;
  pointer-events: none;
  white-space: normal;
}

/* === CHAT VIEW === */
.ai-float-chat {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}
.ai-float-chat.active {
  display: flex;
}
.ai-float-menu.hidden { display: none; }

.ai-chat-back {
  padding: 8px 12px;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer;
  font-size: 0.7rem; font-weight: 600;
  color: var(--accent-blue);
  border: none; background: none;
  border-bottom: 1px solid var(--border-dim);
  transition: background 0.2s;
  width: 100%;
  text-align: left;
  flex-shrink: 0;
}
.ai-chat-back:hover { background: var(--bg-highlight); }

.ai-chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
}

/* Message bubbles */
.ai-msg {
  max-width: 85%;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 0.72rem;
  line-height: 1.45;
  animation: msgFadeIn 0.3s ease;
  word-wrap: break-word;
}
.ai-msg.agent {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  color: var(--text-secondary);
  align-self: flex-start;
  border-bottom-left-radius: 3px;
}
.ai-msg.user {
  background: rgba(45,212,191,0.12);
  border: 1px solid rgba(45,212,191,0.25);
  color: var(--accent-cyan);
  align-self: flex-end;
  border-bottom-right-radius: 3px;
}

@keyframes msgFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* === TYPING INDICATOR === */
.ai-msg.typing {
  display: flex; align-items: center; gap: 4px;
  padding: 10px 16px;
}
.ai-msg.typing .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  animation: typingBounce 1.2s ease-in-out infinite;
}
.ai-msg.typing .dot:nth-child(2) { animation-delay: 0.15s; }
.ai-msg.typing .dot:nth-child(3) { animation-delay: 0.3s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30%           { transform: translateY(-4px); opacity: 1; }
}

/* === CHAT INPUT === */
.ai-chat-input-wrap {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 10px;
  border-top: 1px solid var(--border-dim);
  background: var(--bg-card);
  flex-shrink: 0;
}
.ai-chat-input {
  flex: 1;
  background: var(--bg-panel);
  border: 1px solid var(--border-dim);
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 0.72rem;
  color: var(--text-primary);
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.ai-chat-input::placeholder {
  color: var(--text-dim);
}
.ai-chat-input:focus {
  border-color: var(--accent-cyan);
}
.ai-chat-input:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.ai-chat-send {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--gradient-accent);
  border: none;
  color: #fff;
  font-size: 0.82rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.2s;
}
.ai-chat-send:hover { transform: scale(1.1); }
.ai-chat-send:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none;
}

/* === RESPONSIVE === */
@media (max-width: 400px) {
  .ai-float-panel { width: 280px; }
}
@media (max-width: 360px) {
  .ai-float-panel {
    width: calc(100vw - 24px);
    left: 12px; right: 12px;
  }
}

/* === PREFERS REDUCED MOTION (asset-specific) === */
@media (prefers-reduced-motion: reduce) {
  .ai-float-btn { animation: none; }
  .ai-msg { animation: none; }
  .ai-msg.typing .dot { animation: none; opacity: 0.7; }
  [data-control="preview"] .ai-agent-status { animation: none; }
}
</style>

<div id="ferros-asset-root" data-control="demo">

  <!-- Float Button -->
  <button class="ai-float-btn" id="ai-btn" type="button" aria-label="Open AI assistant">&#x1F916;</button>

        <input type="text" class="ai-chat-input" id="ai-input" placeholder="Type a message..." autocomplete="off" aria-label="Chat message input" />
        <button class="ai-chat-send" id="ai-send" type="button" aria-label="Send message">&#x27A4;</button>

/* ferros-runtime v1.0.0
 *
 * Asset-side IIFE scaffold for all FERROS render assets.

 *   - Runtime exposes window.ferrosRuntime namespace — assets NEVER redefine it
 *   - Runtime OWNS root.dataset.control — assets read via CSS [data-control] selectors
 *
 * See: ADR-008 (docs/adr/ADR-008-modular-rendering-system.md)
 */
(function() {
  'use strict';

  /* ═══ BOOTSTRAPPING ═══ */
  var ASSET_NAME = document.documentElement.dataset.ferrosAsset || 'unknown-asset';
  var root       = document.getElementById('ferros-asset-root');
  var isEmbedded = window.parent !== window;
  var params     = new URLSearchParams(window.location.search);
  var control    = params.get('control') || 'demo';

  /* ═══ REDUCED MOTION ═══ */
  var mql = window.matchMedia('(prefers-reduced-motion: reduce)');
  function isReducedMotion() { return mql.matches; }

  /* ═══ MESSAGING — OUTBOUND ═══ */
  function emit(event, payload) {
    var msg = {
      type: 'ferros:event',
      asset: ASSET_NAME,
      event: event,
      payload: payload

    if (isEmbedded) {
      window.parent.postMessage(msg, '*');
    }
    if (root) {
      root.dispatchEvent(new CustomEvent('ferros:event', {
        detail: msg,
        bubbles: true
      }));
    }
  }

  function reportSize() {
    if (!isEmbedded || !root) return;
    window.parent.postMessage({
      type: 'ferros:resize',
      asset: ASSET_NAME,
      width: root.scrollWidth,
      height: root.scrollHeight
    }, '*');
  }

  /* ═══ MESSAGING — INBOUND ═══ */
  window.addEventListener('message', function(e) {
    if (!e.data || !e.data.type) return;

    if (e.data.type === 'ferros:init') {
      var config = e.data.config || {};
      if (config.control) control = config.control;
      applyControl();
      if (typeof window.onFerrosInit === 'function') {
        window.onFerrosInit(config);

    if (e.data.type === 'ferros:update') {

      var payload = e.data.payload || e.data;
      if (payload.control) {
        control = payload.control;
        applyControl();
      }
      if (typeof window.onFerrosUpdate === 'function') {
        window.onFerrosUpdate(payload);
      }
    }
  });

  /* ═══ CONTROL MODES ═══ */
  function applyControl() {
    if (root) root.dataset.control = control;
  }

  /* ═══ ACCESSIBILITY ═══ */
  function announceToScreenReader(text) {
    var el = document.getElementById('ferros-sr-announce');

    el.textContent = '';

    control: function() { return control; },
    emit: emit,
    reportSize: reportSize,
    isReducedMotion: isReducedMotion,

      { from: 'agent', text: 'Order #1: AAPL limit buy at $188.50, 10 shares. Currently $189.20 \u2014 waiting for dip to fill.' },
      { from: 'user', text: 'Go ahead and fill at market.' },
      { from: 'agent', text: 'Confirmed. AAPL market buy executed: 10 shares at $189.20. Total cost: $1,892.00. Order filled and added to your deck.' }
    ]
  };

  /* === FALLBACK RESPONSES === */
  var fallbackResponses = [
    'I\'ll learn that in a future update! For now, try talking to my fellow agents.',
    'That\'s a great question. My training data doesn\'t cover that yet \u2014 check back after the next patch!',
    'Hmm, I\'m not sure about that one. Try asking the Oracle or Strategist for deeper analysis.',
    'My circuits are still warming up on that topic. In the meantime, explore the other agents!'
  ];

  /* === CONTROL MODE === */
  function applyControl() {
    renderAgentMenu();
    updateInputState();
    if (rt.control() === 'demo') startDemo();
  }

  /* === ferros:update handler === */
  function handleUpdate(payload) {
    if (payload.conversations) {
      var keys = Object.keys(payload.conversations);
      for (var i = 0; i < keys.length; i++) {
        conversations[keys[i]] = payload.conversations[keys[i]];
      }
    }
    if (payload.agents && Array.isArray(payload.agents)) {
      agents = payload.agents;
    }
    renderAgentMenu();
    rt.emit('panel-updated', { agents: agents.map(function(a){ return a.id; }) });
  }

  /* === RENDER AGENT MENU === */
  function renderAgentMenu() {
    menuEl.innerHTML = '';
    for (var i = 0; i < agents.length; i++) {
      var a = agents[i];
      var item = document.createElement('div');
      item.className = 'ai-float-agent';
      item.setAttribute('role', 'listitem');
      item.setAttribute('tabindex', '0');
      item.setAttribute('data-agent', a.id);
      if (a.desc) item.setAttribute('data-desc', a.desc);

      var statusClass = (activeAgent === a.id) ? 'ai-agent-status active' : 'ai-agent-status';

      item.innerHTML =
        '<div class="ai-float-agent-icon">' + a.icon + '</div>' +
        '<div class="ai-float-agent-info">' +
          '<div class="ai-float-agent-name">' + esc(a.name) + '</div>' +
          '<div class="ai-float-agent-role">' + esc(a.role) + '</div>' +
        '</div>' +
        '<div class="' + statusClass + '"><span class="sr-only">Agent online</span></div>' +
        '<div class="ai-float-agent-arrow">&#x203A;</div>';

      (function(agentId) {
        item.addEventListener('click', function() { openAgentChat(agentId); });
        item.addEventListener('keydown', function(ev) {
          if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); openAgentChat(agentId); }
        });
      })(a.id);

      menuEl.appendChild(item);
    }
  }

  /* === PANEL OPEN / CLOSE / MINIMIZE === */
  function openPanel() {
    panelState = 'open';
    panel.classList.add('open');
    panel.setAttribute('aria-modal', 'true');
    btn.classList.add('hidden');
    rt.emit('panel-opened', null);
    setupFocusTrap();
    /* Focus first interactive element in panel */
    var firstFocusable = panel.querySelector('button, [tabindex="0"], input');
    if (firstFocusable) firstFocusable.focus();
  }

  function closePanel() {
    panelState = 'closed';
    panel.classList.remove('open');
    panel.setAttribute('aria-modal', 'false');
    btn.classList.remove('hidden');
    /* Reset to menu view */
    showMenu();
    activeAgent = null;
    clearTypingTimer();
    rt.emit('panel-closed', null);
    removeFocusTrap();
    btn.focus();
  }

  function minimizePanel() {
    panelState = 'minimized';
    panel.classList.remove('open');
    panel.setAttribute('aria-modal', 'false');
    btn.classList.remove('hidden');
    clearTypingTimer();
    rt.emit('panel-minimized', null);
    removeFocusTrap();
    btn.focus();
  }

  function togglePanel() {
    if (panelState === 'open') {
      closePanel();
    } else if (panelState === 'minimized') {
      /* Restore to last state (menu or chat) without resetting */
      openPanel();
    } else {
      openPanel();
    }
  }

  /* === FOCUS TRAP === */
  var focusTrapHandler = null;

  function setupFocusTrap() {
    removeFocusTrap();
    focusTrapHandler = function(e) {
      if (e.key === 'Tab') {
        var focusable = panel.querySelectorAll('button:not([disabled]), [tabindex="0"], input:not([disabled])');
        if (focusable.length === 0) return;
        var first = focusable[0];
        var last = focusable[focusable.length - 1];
        if (e.shiftKey) {
          if (document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else {
          if (document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        closePanel();
      }
    };
    document.addEventListener('keydown', focusTrapHandler);
  }

  function removeFocusTrap() {
    if (focusTrapHandler) {
      document.removeEventListener('keydown', focusTrapHandler);
      focusTrapHandler = null;
    }
  }

  /* === VIEW SWITCHING === */
  function showMenu() {
    viewState = 'menu';
    menuEl.classList.remove('hidden');
    chatEl.classList.remove('active');
    updateInputState();
  }

  function showChat() {
    viewState = 'chat';
    menuEl.classList.add('hidden');
    chatEl.classList.add('active');
    updateInputState();
  }

  /* === INPUT STATE === */
  function updateInputState() {
    var canType = (rt.control() === 'play');
    inputEl.disabled = !canType;
    sendBtn.disabled = !canType;
    if (!canType) {
      inputEl.setAttribute('title', 'Chat available in Play mode');
      inputEl.placeholder = 'Chat available in Play mode';
    } else {
      inputEl.removeAttribute('title');
      inputEl.placeholder = 'Type a message...';
    }
  }

  /* === TYPING INDICATOR === */
  function showTypingIndicator() {
    var indicator = document.createElement('div');
    indicator.className = 'ai-msg agent typing';
    indicator.id = 'ai-typing';
    indicator.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    msgEl.appendChild(indicator);
    msgEl.scrollTop = msgEl.scrollHeight;
  }

  function removeTypingIndicator() {
    var indicator = document.getElementById('ai-typing');
    if (indicator) indicator.remove();
  }

  function clearTypingTimer() {
    if (typingTimer) { clearTimeout(typingTimer); typingTimer = null; }
    removeTypingIndicator();
  }

  /* === APPEND MESSAGE === */
  function appendMessage(from, text) {
    var div = document.createElement('div');
    div.className = 'ai-msg ' + from;
    div.textContent = text;
    msgEl.appendChild(div);
    msgEl.scrollTop = msgEl.scrollHeight;
  }

  /* === OPEN AGENT CHAT === */
  function openAgentChat(agentId) {
    activeAgent = agentId;
    showChat();
    msgEl.innerHTML = '';
    clearTypingTimer();
    renderAgentMenu(); /* Update status dots */

    rt.emit('agent-selected', { agent: agentId });

    var convo = conversations[agentId];
    if (!convo || convo.length === 0) return;

    var delay = rt.isReducedMotion() ? 50 : 600;
    var typingDelay = rt.isReducedMotion() ? 10 : 800;
    var pending = [];

    for (var i = 0; i < convo.length; i++) {
      (function(msg, idx) {
        var t1 = setTimeout(function() {
          if (msg.from === 'agent') {
            showTypingIndicator();
            var t2 = setTimeout(function() {
              removeTypingIndicator();
              appendMessage(msg.from, msg.text);
            }, typingDelay);
            pending.push(t2);
          } else {
            appendMessage(msg.from, msg.text);
          }
        }, idx * (delay + typingDelay));
        pending.push(t1);
      })(convo[i], i);
    }

    /* Focus input after messages load (PLAY mode) */
    if (rt.control() === 'play') {
      setTimeout(function() { inputEl.focus(); }, convo.length * (delay + typingDelay) + 200);
    }
  }

  /* === BACK TO MENU === */
  function backToMenu() {
    showMenu();
    activeAgent = null;
    clearTypingTimer();
    renderAgentMenu();
  }

  /* === SEND USER MESSAGE === */
  function sendMessage() {
    if (rt.control() !== 'play') return;
    var text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    appendMessage('user', text);

    /* Agent responds with typing indicator */
    var typingMs = rt.isReducedMotion() ? 10 : 800;
    showTypingIndicator();
    inputEl.disabled = true;
    sendBtn.disabled = true;

    typingTimer = setTimeout(function() {
      removeTypingIndicator();
      var response = fallbackResponses[fallbackIdx % fallbackResponses.length];
      fallbackIdx++;
      appendMessage('agent', response);
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
      typingTimer = null;
    }, typingMs);
  }

  /* === DEMO MODE === */
  function startDemo() {
    if (rt.isReducedMotion()) return;
    demoTimeout = setTimeout(function() {
      togglePanel();
      demoTimeout2 = setTimeout(function() {
        openAgentChat('scout');
      }, 2000);
    }, 1000);
  }

  /* === EVENT BINDINGS === */
  btn.addEventListener('click', function() { togglePanel(); });

  closeBtn.addEventListener('click', function() { closePanel(); });

  minBtn.addEventListener('click', function() { minimizePanel(); });

  backBtn.addEventListener('click', function() { backToMenu(); });

  sendBtn.addEventListener('click', function() { sendMessage(); });

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
  });

  /* =========================================================
   *  FERROS CALLBACKS
   * ========================================================= */
  window.onFerrosInit = function(config) {
    applyControl();
  };

  window.onFerrosUpdate = function(payload) {
    handleUpdate(payload);
  };

  /* === INIT === */
  applyControl();
})();
</script>
</body>
</html>
