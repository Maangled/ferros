<!DOCTYPE html>
<html lang="en" data-ferros-asset="pvp-arena" data-version="1.0.0">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FERROS Asset: PvP Arena</title>
<!--
  ╔══════════════════════════════════════════════════╗
  ║  FERROS ASSET: pvp-arena                         ║
  ║  Control Levels: DEMO | PREVIEW | PLAY           ║
  ║  Dependencies: none                              ║
  ║  Modes: Practice | Ranked                        ║
  ╚══════════════════════════════════════════════════╝
-->
<style>
/* === FERROS DESIGN TOKENS === */
:root {
  --bg-base: #0a0c10; --bg-panel: #111520; --bg-card: #161b28;
  --bg-card-alt: #1a2035; --bg-highlight: #1e2840;
  --border-dim: #1e2a3a; --border-accent: #2a3f5f; --border-bright: #3a5a8f;
  --text-primary: #e8edf5; --text-secondary: #8fa0b8; --text-dim: #5a6a80; --text-code: #7eb8e8;
  --accent-blue: #4a90d9; --accent-cyan: #2dd4bf; --accent-green: #34d399;
  --accent-amber: #f59e0b; --accent-red: #f87171; --accent-purple: #a78bfa;
  --accent-pink: #f472b6; --accent-orange: #fb923c;
  --gradient-card: linear-gradient(145deg, #161b28 0%, #111520 100%);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.4);
  --radius-card: 8px; --radius-panel: 12px;
  --font-mono: 'Courier New', Courier, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-base); color: var(--text-primary); }

/* === ARENA TABS === */
.arena-tabs {
  display: flex; gap: 0; margin-bottom: 16px;
}
.arena-tab {
  padding: 8px 20px; font-family: var(--font-mono); font-size: 0.75rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer;
  background: var(--bg-panel); border: 1px solid var(--border-dim); color: var(--text-dim);
  transition: all 0.2s; border-bottom: 2px solid transparent;
}
.arena-tab:first-child { border-radius: var(--radius-card) 0 0 0; }
.arena-tab:last-child { border-radius: 0 var(--radius-card) 0 0; }
.arena-tab.active {
  color: var(--accent-cyan); border-bottom-color: var(--accent-cyan);
  background: var(--bg-card);
}
.arena-tab:hover:not(.active) { color: var(--text-secondary); }

.arena-panel { display: none; }
.arena-panel.active { display: block; }

/* === ARENA BOARD === */
.arena-board {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 0;
  background: var(--bg-panel); border: 1px solid var(--border-dim);
  border-radius: var(--radius-panel); overflow: hidden; min-height: 320px;
}

/* === ARENA SIDE === */
.arena-side { padding: 16px; }
.arena-side-you { border-right: 1px solid var(--border-dim); }
.arena-side-opp { border-left: 1px solid var(--border-dim); }

.arena-player-label {
  font-family: var(--font-mono); font-size: 0.78rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
}
.arena-side-you .arena-player-label { color: var(--accent-green); }
.arena-side-opp .arena-player-label { color: var(--accent-red); }

/* Health Bar */
.arena-health-bar {
  width: 100%; height: 8px; background: var(--bg-highlight); border-radius: 4px;
  overflow: hidden; margin-bottom: 4px;
}
.arena-health-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
.arena-side-you .arena-health-fill { background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan)); }
.arena-side-opp .arena-health-fill { background: linear-gradient(90deg, var(--accent-red), var(--accent-orange)); }
.arena-health-text {
  font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim); margin-bottom: 12px;
}

/* Mini Lanes */
.arena-mini-lanes { display: flex; flex-direction: column; gap: 8px; }
.arena-mini-lane {
  background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: 6px;
  padding: 8px; position: relative;
}
.arena-mini-lane-label {
  font-family: var(--font-mono); font-size: 0.55rem; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
}
.arena-mini-lane-day .arena-mini-lane-label { color: var(--accent-red); }
.arena-mini-lane-swing .arena-mini-lane-label { color: var(--accent-amber); }
.arena-mini-lane-long .arena-mini-lane-label { color: var(--accent-green); }
.arena-mini-lane-day { border-left: 2px solid var(--accent-red); }
.arena-mini-lane-swing { border-left: 2px solid var(--accent-amber); }
.arena-mini-lane-long { border-left: 2px solid var(--accent-green); }

.arena-mini-cards { display: flex; gap: 6px; flex-wrap: wrap; }
.arena-mini-card {
  background: var(--bg-card-alt); border: 1px solid var(--accent-cyan);
  border-radius: 4px; padding: 4px 8px; font-family: var(--font-mono);
  font-size: 0.68rem; font-weight: 700; color: var(--accent-cyan);
  transition: all 0.2s;
}
.arena-mini-card:hover { background: rgba(45,212,191,0.08); transform: scale(1.05); }

/* === ARENA CENTER === */
.arena-center {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px 24px; min-width: 140px;
  background: linear-gradient(180deg, rgba(167,139,250,0.05) 0%, rgba(248,113,113,0.05) 50%, rgba(45,212,191,0.05) 100%);
  border-left: 1px solid var(--border-dim); border-right: 1px solid var(--border-dim);
}
.arena-vs {
  font-family: var(--font-mono); font-size: 2rem; font-weight: 900;
  background: linear-gradient(180deg, var(--accent-purple), var(--accent-red));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 12px;
}
.arena-round {
  font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
}
.arena-timer {
  font-family: var(--font-mono); font-size: 1.4rem; font-weight: 700;
  color: var(--accent-amber); margin-bottom: 16px; letter-spacing: 0.05em;
}
.arena-timer.low { color: var(--accent-red); animation: timerPulse 0.8s ease-in-out infinite; }
.arena-play-btn {
  padding: 8px 18px; background: rgba(45,212,191,0.12); border: 1px solid var(--accent-cyan);
  border-radius: 6px; color: var(--accent-cyan); font-family: var(--font-mono);
  font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
  cursor: pointer; transition: all 0.2s;
}
.arena-play-btn:hover { background: rgba(45,212,191,0.2); transform: scale(1.05); }
.arena-play-btn:active { transform: scale(0.98); }
.arena-play-btn.played {
  background: rgba(90,106,128,0.15); border-color: var(--border-dim);
  color: var(--text-dim); cursor: default;
}

/* === RANKED PANEL === */
.ranked-panel {
  background: var(--bg-panel); border: 1px solid var(--border-dim);
  border-radius: var(--radius-panel); padding: 20px; margin-top: 16px;
  text-align: center;
}
.ranked-badge {
  font-family: var(--font-mono); font-size: 1.1rem; font-weight: 900;
  color: var(--accent-amber); margin-bottom: 4px;
}
.ranked-elo {
  font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-secondary);
  margin-bottom: 12px;
}
.ranked-progress-bar {
  width: 100%; max-width: 280px; height: 8px; background: var(--bg-highlight);
  border-radius: 4px; overflow: hidden; margin: 0 auto 6px;
}
.ranked-progress-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--accent-amber), var(--accent-orange));
  transition: width 1s ease;
}
.ranked-progress-text {
  font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-dim);
}
.ranked-stats {
  display: flex; justify-content: center; gap: 20px; margin-top: 12px;
}
.ranked-stat {
  font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim);
}
.ranked-stat-val { color: var(--text-secondary); font-weight: 600; }

@keyframes timerPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes healthDrain { 0% { filter: brightness(1); } 50% { filter: brightness(1.3); } 100% { filter: brightness(1); } }

/* DEMO mode */
[data-control="demo"] .arena-play-btn { pointer-events: none; }
[data-control="demo"] .arena-tab { pointer-events: none; }
[data-control="demo"] .arena-mini-card { pointer-events: none; }

/* PREVIEW mode */
[data-control="preview"] .arena-play-btn { cursor: help; pointer-events: none; }

/* Standalone layout */
.asset-showcase { padding: 24px; max-width: 800px; margin: 0 auto; }
</style>
</head>
<body>
<div id="ferros-asset-root" data-control="demo">
  <div class="asset-showcase">
    <!-- Tabs -->
    <div class="arena-tabs">
      <div class="arena-tab active" data-tab="practice">Practice</div>
      <div class="arena-tab" data-tab="ranked">Ranked</div>
    </div>

    <!-- Practice Panel -->
    <div class="arena-panel active" data-panel="practice">
      <div class="arena-board">
        <!-- YOU side -->
        <div class="arena-side arena-side-you">
          <div class="arena-player-label">YOU</div>
          <div class="arena-health-bar"><div class="arena-health-fill" id="you-health" style="width:78%"></div></div>
          <div class="arena-health-text" id="you-health-text">78 / 100 HP</div>
          <div class="arena-mini-lanes">
            <div class="arena-mini-lane arena-mini-lane-day">
              <div class="arena-mini-lane-label">Day Trade</div>
              <div class="arena-mini-cards">
                <div class="arena-mini-card">NVDA</div>
                <div class="arena-mini-card">AMD</div>
              </div>
            </div>
            <div class="arena-mini-lane arena-mini-lane-swing">
              <div class="arena-mini-lane-label">Swing</div>
              <div class="arena-mini-cards">
                <div class="arena-mini-card">MSFT</div>
              </div>
            </div>
            <div class="arena-mini-lane arena-mini-lane-long">
              <div class="arena-mini-lane-label">Long Hold</div>
              <div class="arena-mini-cards">
                <div class="arena-mini-card">AAPL</div>
                <div class="arena-mini-card">BRK.B</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Center -->
        <div class="arena-center">
          <div class="arena-vs">VS</div>
          <div class="arena-round">Round 3 / 5</div>
          <div class="arena-timer" id="arena-timer">2:45</div>
          <button class="arena-play-btn" id="play-card-btn">Play a Card</button>
        </div>

        <!-- OPPONENT side -->
        <div class="arena-side arena-side-opp">
          <div class="arena-player-label">OPPONENT</div>
          <div class="arena-health-bar"><div class="arena-health-fill" id="opp-health" style="width:62%"></div></div>
          <div class="arena-health-text" id="opp-health-text">62 / 100 HP</div>
          <div class="arena-mini-lanes">
            <div class="arena-mini-lane arena-mini-lane-day">
              <div class="arena-mini-lane-label">Day Trade</div>
              <div class="arena-mini-cards">
                <div class="arena-mini-card">TSLA</div>
              </div>
            </div>
            <div class="arena-mini-lane arena-mini-lane-swing">
              <div class="arena-mini-lane-label">Swing</div>
              <div class="arena-mini-cards">
                <div class="arena-mini-card">META</div>
                <div class="arena-mini-card">GOOG</div>
              </div>
            </div>
            <div class="arena-mini-lane arena-mini-lane-long">
              <div class="arena-mini-lane-label">Long Hold</div>
              <div class="arena-mini-cards">
                <div class="arena-mini-card">JNJ</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Ranked Panel -->
    <div class="arena-panel" data-panel="ranked">
      <div class="ranked-panel">
        <div class="ranked-badge">GOLD III</div>
        <div class="ranked-elo">ELO 1847</div>
        <div class="ranked-progress-bar"><div class="ranked-progress-fill" style="width:67%"></div></div>
        <div class="ranked-progress-text">67 / 100 LP to GOLD II</div>
        <div class="ranked-stats">
          <div class="ranked-stat">W: <span class="ranked-stat-val">142</span></div>
          <div class="ranked-stat">L: <span class="ranked-stat-val">98</span></div>
          <div class="ranked-stat">WR: <span class="ranked-stat-val">59.2%</span></div>
          <div class="ranked-stat">Streak: <span class="ranked-stat-val" style="color:var(--accent-green)">W3</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';
  var root = document.getElementById('ferros-asset-root');
  var isEmbedded = window.parent !== window;
  var params = new URLSearchParams(window.location.search);
  var control = params.get('control') || 'demo';
  var timerInterval = null;
  var demoHealthInterval = null;
  var timerSeconds = 165; // 2:45

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'ferros:init') {
      control = e.data.config.control || control;
      applyControl();
    }
    if (e.data && e.data.type === 'ferros:update' && e.data.payload) {
      updateArena(e.data.payload);
    }
  });

  function applyControl() {
    root.dataset.control = control;
    if (control === 'demo') startDemo();
    if (control === 'play') initPlay();
    if (control === 'play' || control === 'preview') initTabs();
  }

  function emit(event, payload) {
    if (isEmbedded) {
      window.parent.postMessage({ type: 'ferros:event', asset: 'pvp-arena', event: event, payload: payload }, '*');
    }
  }

  function reportSize() {
    if (isEmbedded) {
      window.parent.postMessage({ type: 'ferros:resize', asset: 'pvp-arena', width: root.scrollWidth, height: root.scrollHeight }, '*');
    }
  }

  // Format seconds as M:SS
  function formatTime(s) {
    var m = Math.floor(s / 60);
    var sec = s % 60;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  // Update timer display
  function updateTimerDisplay() {
    var timerEl = root.querySelector('#arena-timer');
    if (!timerEl) return;
    timerEl.textContent = formatTime(timerSeconds);
    if (timerSeconds <= 30) {
      timerEl.classList.add('low');
    } else {
      timerEl.classList.remove('low');
    }
  }

  // Timer countdown
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(function() {
      if (timerSeconds > 0) {
        timerSeconds--;
        updateTimerDisplay();
        emit('match-update', { timer: timerSeconds });
      } else {
        clearInterval(timerInterval);
        emit('match-update', { timer: 0, status: 'time-up' });
      }
    }, 1000);
  }

  // Tab switching
  function initTabs() {
    root.querySelectorAll('.arena-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        root.querySelectorAll('.arena-tab').forEach(function(t) { t.classList.remove('active'); });
        root.querySelectorAll('.arena-panel').forEach(function(p) { p.classList.remove('active'); });
        tab.classList.add('active');
        var panel = root.querySelector('[data-panel="' + tab.dataset.tab + '"]');
        if (panel) panel.classList.add('active');
        emit('match-update', { tab: tab.dataset.tab });
      });
    });
  }

  // Play a Card button
  function initPlay() {
    initTabs();
    var btn = root.querySelector('#play-card-btn');
    if (btn) {
      btn.addEventListener('click', function() {
        if (btn.classList.contains('played')) return;
        btn.classList.add('played');
        btn.textContent = 'Card Played!';
        emit('match-update', { action: 'card-played' });
        // Reset after 2s
        setTimeout(function() {
          btn.classList.remove('played');
          btn.textContent = 'Play a Card';
        }, 2000);
      });
    }
    startTimer();
  }

  // DEMO mode: timer auto-runs, health bars animate slowly
  function startDemo() {
    startTimer();
    var youHP = 78;
    var oppHP = 62;
    demoHealthInterval = setInterval(function() {
      // Gentle health fluctuation
      youHP = Math.max(10, Math.min(100, youHP + (Math.random() - 0.45) * 3));
      oppHP = Math.max(10, Math.min(100, oppHP + (Math.random() - 0.55) * 3));
      var youFill = root.querySelector('#you-health');
      var oppFill = root.querySelector('#opp-health');
      var youText = root.querySelector('#you-health-text');
      var oppText = root.querySelector('#opp-health-text');
      if (youFill) youFill.style.width = Math.round(youHP) + '%';
      if (oppFill) oppFill.style.width = Math.round(oppHP) + '%';
      if (youText) youText.textContent = Math.round(youHP) + ' / 100 HP';
      if (oppText) oppText.textContent = Math.round(oppHP) + ' / 100 HP';
    }, 1500);
  }

  // Update arena from parent
  function updateArena(data) {
    if (data.youHP !== undefined) {
      var youFill = root.querySelector('#you-health');
      if (youFill) youFill.style.width = data.youHP + '%';
    }
    if (data.oppHP !== undefined) {
      var oppFill = root.querySelector('#opp-health');
      if (oppFill) oppFill.style.width = data.oppHP + '%';
    }
    if (data.timer !== undefined) {
      timerSeconds = data.timer;
      updateTimerDisplay();
    }
  }

  applyControl();
  updateTimerDisplay();
  reportSize();
  if (typeof ResizeObserver !== 'undefined') new ResizeObserver(reportSize).observe(root);
})();
</script>
</body>
</html>
