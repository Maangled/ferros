<h1>H1 — FERROS Contract Validator</h1>
<div class="meta">Harness version 1.2 &nbsp;|&nbsp; Gates: C1-C7, V3a (structural), C6 consumption (PR 13), S2 CapabilityGrant v0 evidence &nbsp;|&nbsp; Run on file:// in Chrome</div>

<div id="result-block"><pre id="result-json">running...</pre></div>

<script src="_constants.js"></script>
<script>
/* ==========================================================================
   FERROS CONTRACT VALIDATOR  —  subset validator for FERROS JSON schemas
   Implements a STRICT SUBSET of JSON Schema Draft 2020-12.
   Any keyword encountered during schema processing that is not in VALIDATE_KEYWORDS
   or META_KEYWORDS triggers a FAIL-LOUD error (not a warning).
   ========================================================================== */

// Keywords that trigger validation logic when found in a (sub-)schema
var VALIDATE_KEYWORDS = [
  'type','properties','required','additionalProperties',
  'items','minLength','maxLength','pattern',
  'enum','const','minimum','maximum','exclusiveMinimum','exclusiveMaximum','minItems',
  'oneOf','$ref'
];

// Keywords that are known/expected in schemas but produce no validation behaviour
var META_KEYWORDS = [
  '$schema','$id','$defs','definitions','title','description',
  'default','format','examples','$comment','x-ferros-signature'
];

var ALL_KNOWN_KEYWORDS = VALIDATE_KEYWORDS.concat(META_KEYWORDS);

/* --------------------------------------------------------------------------
   validate(data, schema, rootSchema) → { valid: bool, errors: string[] }
   rootSchema: the top-level schema object (for $ref resolution)
   -------------------------------------------------------------------------- */
function validate(data, schema, rootSchema) {
  if (rootSchema === undefined) rootSchema = schema;
  var errors = [];

  // FAIL-LOUD: detect unsupported keywords
  if (schema && typeof schema === 'object' && !Array.isArray(schema)) {
    var keys = Object.keys(schema);
    for (var ki = 0; ki < keys.length; ki++) {
      var k = keys[ki];
      if (ALL_KNOWN_KEYWORDS.indexOf(k) === -1) {
        return {
          valid: false,
          errors: ['FAIL-LOUD: unsupported JSON Schema keyword "' + k + '" found in schema — validator does not support this keyword. Either remove it or extend the validator.'],
          failLoud: true
        };
      }
    }
  }

  // $ref — local #/$defs/ and #/definitions/ only
  if (schema.$ref !== undefined) {
    var ref = schema.$ref;
    var refPrefix = null;
    var refContainer = null;
    if (ref.indexOf('#/$defs/') === 0) {
      refPrefix = '#/$defs/';
      refContainer = '$defs';
    } else if (ref.indexOf('#/definitions/') === 0) {
      refPrefix = '#/definitions/';
      refContainer = 'definitions';
    } else {
      return { valid: false, errors: ['FAIL-LOUD: $ref "' + ref + '" is not a local #/$defs/ or #/definitions/ reference — only local root definitions are supported.'], failLoud: true };
    }
    var defName = ref.slice(refPrefix.length);
    var rootDefinitions = rootSchema[refContainer];
    if (!rootDefinitions || !rootDefinitions[defName]) {
      return { valid: false, errors: ['$ref resolution failed: "' + refContainer + '.' + defName + '" not found in root schema'] };
    }
    // Merge ONLY the $ref target — do not carry outer schema keywords (they were already handled or don't apply)
    return validate(data, rootDefinitions[defName], rootSchema);
  }

  // type
  if (schema.type !== undefined) {
    var types = Array.isArray(schema.type) ? schema.type : [schema.type];
    var typeOk = false;
    for (var ti = 0; ti < types.length; ti++) {
      var t = types[ti];
      if (t === 'null'    && data === null)             { typeOk = true; break; }
      if (t === 'string'  && typeof data === 'string')  { typeOk = true; break; }
      if (t === 'boolean' && typeof data === 'boolean') { typeOk = true; break; }
      if (t === 'integer' && typeof data === 'number' && data === Math.floor(data)) { typeOk = true; break; }
      if (t === 'number'  && typeof data === 'number')  { typeOk = true; break; }
      if (t === 'array'   && Array.isArray(data))       { typeOk = true; break; }
      if (t === 'object'  && typeof data === 'object' && data !== null && !Array.isArray(data)) { typeOk = true; break; }
    }
    if (!typeOk) {
      errors.push('type: expected ' + JSON.stringify(schema.type) + ', got ' + (data === null ? 'null' : Array.isArray(data) ? 'array' : typeof data));
    }
  }

  // enum
  if (schema.enum !== undefined) {
    var enumOk = false;
    for (var ei = 0; ei < schema.enum.length; ei++) {
      if (deepEqual(data, schema.enum[ei])) { enumOk = true; break; }
    }
    if (!enumOk) errors.push('enum: value ' + JSON.stringify(data) + ' not in ' + JSON.stringify(schema.enum));
  }

  // const
  if (schema.const !== undefined) {
    if (!deepEqual(data, schema.const)) {
      errors.push('const: expected ' + JSON.stringify(schema.const) + ', got ' + JSON.stringify(data));
    }
  }

  // String keywords
  if (typeof data === 'string') {
    if (schema.minLength !== undefined && data.length < schema.minLength) {
      errors.push('minLength: ' + data.length + ' < ' + schema.minLength);
    }
    if (schema.maxLength !== undefined && data.length > schema.maxLength) {
      errors.push('maxLength: ' + data.length + ' > ' + schema.maxLength);
    }
    if (schema.pattern !== undefined) {
      try {
        var rx = new RegExp(schema.pattern);
        if (!rx.test(data)) {
          errors.push('pattern: "' + data + '" does not match /' + schema.pattern + '/');
        }
      } catch (e) {
        errors.push('pattern: invalid regex "' + schema.pattern + '": ' + e.message);
      }
    }
  }

  // Number / integer keywords
  if (typeof data === 'number') {
    if (schema.minimum !== undefined && data < schema.minimum) {
      errors.push('minimum: ' + data + ' < ' + schema.minimum);
    }
    if (schema.maximum !== undefined && data > schema.maximum) {
      errors.push('maximum: ' + data + ' > ' + schema.maximum);
    }
    if (schema.exclusiveMinimum !== undefined && !(data > schema.exclusiveMinimum)) {
      errors.push('exclusiveMinimum: ' + data + ' <= ' + schema.exclusiveMinimum);
    }
    if (schema.exclusiveMaximum !== undefined && !(data < schema.exclusiveMaximum)) {
      errors.push('exclusiveMaximum: ' + data + ' >= ' + schema.exclusiveMaximum);
    }
  }

  // Array keywords
  if (Array.isArray(data)) {
    if (schema.minItems !== undefined && data.length < schema.minItems) {
      errors.push('minItems: ' + data.length + ' < ' + schema.minItems);
    }
    if (schema.items !== undefined) {
      for (var ii = 0; ii < data.length; ii++) {
        var itemResult = validate(data[ii], schema.items, rootSchema);
        if (!itemResult.valid) {
          for (var ie = 0; ie < itemResult.errors.length; ie++) {
            errors.push('items[' + ii + ']: ' + itemResult.errors[ie]);
          }
          if (itemResult.failLoud) return { valid: false, errors: errors, failLoud: true };
        }
      }
    }
  }

  // Object keywords
  if (typeof data === 'object' && data !== null && !Array.isArray(data)) {
    // required
    if (schema.required !== undefined) {
      for (var ri = 0; ri < schema.required.length; ri++) {
        var reqKey = schema.required[ri];
        if (!Object.prototype.hasOwnProperty.call(data, reqKey)) {
          errors.push('required: missing property "' + reqKey + '"');
        }
      }
    }

    // properties
    var propKeys = schema.properties ? Object.keys(schema.properties) : [];
    if (schema.properties !== undefined) {
      for (var pi = 0; pi < propKeys.length; pi++) {
        var pk = propKeys[pi];
        if (Object.prototype.hasOwnProperty.call(data, pk)) {
          var pResult = validate(data[pk], schema.properties[pk], rootSchema);
          if (!pResult.valid) {
            for (var pe = 0; pe < pResult.errors.length; pe++) {
              errors.push(pk + ': ' + pResult.errors[pe]);
            }
            if (pResult.failLoud) return { valid: false, errors: errors, failLoud: true };
          }
        }
      }
    }

    // additionalProperties: false
    if (schema.additionalProperties === false) {
      var dataKeys = Object.keys(data);
      for (var di = 0; di < dataKeys.length; di++) {
        var dk = dataKeys[di];
        if (propKeys.indexOf(dk) === -1) {
          errors.push('additionalProperties: unexpected key "' + dk + '"');
        }
      }
    }
  }

  // oneOf — exactly one must match
  if (schema.oneOf !== undefined) {
    var oneOfPassed = 0;
    var oneOfErrors = [];
    for (var oi = 0; oi < schema.oneOf.length; oi++) {
      var oResult = validate(data, schema.oneOf[oi], rootSchema);
      if (oResult.failLoud) return { valid: false, errors: oResult.errors, failLoud: true };
      if (oResult.valid) {
        oneOfPassed++;
      } else {
        oneOfErrors.push('[' + oi + '] ' + oResult.errors.slice(0,2).join('; '));
      }
    }
    if (oneOfPassed !== 1) {
      errors.push('oneOf: expected exactly 1 match, got ' + oneOfPassed +
        ' (candidates failed: ' + oneOfErrors.join(' / ') + ')');
    }
  }

  return { valid: errors.length === 0, errors: errors };
}

/* deepEqual: structural equality for primitives and plain objects/arrays */
function deepEqual(a, b) {
  if (a === b) return true;
  if (a === null || b === null) return false;
  if (typeof a !== typeof b) return false;
  if (Array.isArray(a) !== Array.isArray(b)) return false;
  if (Array.isArray(a)) {
    if (a.length !== b.length) return false;
    for (var i = 0; i < a.length; i++) if (!deepEqual(a[i], b[i])) return false;
    return true;
  }
  if (typeof a === 'object') {
    var ak = Object.keys(a), bk = Object.keys(b);
    if (ak.length !== bk.length) return false;
    for (var j = 0; j < ak.length; j++) if (!deepEqual(a[ak[j]], b[ak[j]])) return false;
    return true;
  }
  return false;
}

/* Recursively collect all keyword names from a schema object.
  Skips treating keys inside 'properties', '$defs', and 'definitions' maps as schema keywords
   (those keys are property/definition names, not schema vocabulary). */
function collectKeywords(obj, out) {
  if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return;
  var keys = Object.keys(obj);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    out[k] = true;
    // 'properties', '$defs', and 'definitions' map property/definition names to sub-schemas.
    // Don't add those names as keywords — recurse into the sub-schema values directly.
    if (k === 'properties' || k === '$defs' || k === 'definitions') {
      var mapObj = obj[k];
      if (mapObj && typeof mapObj === 'object' && !Array.isArray(mapObj)) {
        var mapKeys = Object.keys(mapObj);
        for (var mi = 0; mi < mapKeys.length; mi++) {
          collectKeywords(mapObj[mapKeys[mi]], out);
        }
      }
    } else if (k === 'x-ferros-signature') {
      continue;
    } else {
      collectKeywords(obj[k], out);
    }
  }
}

/* Strip fixture meta-keys before validating data against a schema.
   Strips: $comment, _invalidReason, _fixture, $schema (top-level annotation),
   expectedError, expect — these are fixture-only annotations, not schema data. */
function stripFixtureMeta(obj) {
  if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return obj;
  var copy = {};
  var keys = Object.keys(obj);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    if (k === '$comment' || k === '_invalidReason' || k === '_fixture' ||
        k === '$schema' || k === 'expectedError' || k === 'expect') continue;
    copy[k] = obj[k];
  }
  return copy;
}

/* ==========================================================================
   TEST RUNNER
   ========================================================================== */

var allTests = [];
var groups = [];

function addGroup(label) {
  var g = { label: label, tests: [] };
  groups.push(g);
  return g;
}

function runTest(group, name, fn) {
  var t = { name: name, status: 'skip', detail: '', error: '' };
  try {
    var r = fn();
    t.status = r.pass ? 'pass' : 'fail';
    t.detail = r.detail || '';
    t.error   = r.error  || '';
  } catch (e) {
    t.status = 'fail';
    t.error  = 'Uncaught exception: ' + e.message;
  }
  group.tests.push(t);
  allTests.push(t);
  return t;
}

/* ==========================================================================
   GROUP 1 — Schema keyword audit
   Each FERROS schema must only contain keywords from ALL_KNOWN_KEYWORDS.
   ========================================================================== */
var g1 = addGroup('Group 1 — Schema keyword audit');

for (var si = 0; si < FERROS_SCHEMAS.length; si++) {
  (function(entry) {
    runTest(g1, 'Keyword audit: ' + entry.name, function() {
      var kw = {};
      collectKeywords(entry.schema, kw);
      var found = Object.keys(kw);
      var unknown = [];
      for (var i = 0; i < found.length; i++) {
        if (ALL_KNOWN_KEYWORDS.indexOf(found[i]) === -1) unknown.push(found[i]);
      }
      if (unknown.length > 0) {
        return { pass: false, error: 'FAIL-LOUD — unsupported keywords: ' + unknown.join(', ') };
      }
      return { pass: true, detail: found.filter(function(k){ return VALIDATE_KEYWORDS.indexOf(k) !== -1; }).join(', ') };
    });
  })(FERROS_SCHEMAS[si]);
}

/* ==========================================================================
   GROUP 2 — Golden fixture positive validation (expect PASS)
   ========================================================================== */
var g2 = addGroup('Group 2 — Golden fixture positive validation and S2 signing contract checks');

runTest(g2, 'grant-valid validates against SCHEMA_CAPABILITY_GRANT_V0', function() {
  var data = stripFixtureMeta(FIXTURE_GRANT_VALID);
  var r = validate(data, SCHEMA_CAPABILITY_GRANT_V0);
  if (r.valid) {
    return { pass: true, detail: 'signed CapabilityGrant fixture matches the frozen S2 envelope schema' };
  }
  return { pass: false, error: r.errors.slice(0, 5).join(' | ') + (r.errors.length > 5 ? ' (+ ' + (r.errors.length - 5) + ' more)' : '') };
});

runTest(g2, 'profile-valid validates against SCHEMA_PROFILE_V0', function() {
  var data = stripFixtureMeta(FIXTURE_PROFILE_VALID);
  var r = validate(data, SCHEMA_PROFILE_V0);
  if (r.valid) {
    return { pass: true, detail: 'dedicated S2 golden profile fixture matches the frozen unsigned profile.v0 contract' };
  }
  return { pass: false, error: r.errors.slice(0, 5).join(' | ') + (r.errors.length > 5 ? ' (+ ' + (r.errors.length - 5) + ' more)' : '') };
});

runTest(g2, 'inline local-push envelope validates against SCHEMA_LOCAL_PUSH_AUDIT_ENVELOPE', function() {
  var data = {
    envelopeVersion: '1.0',
    envelopeType: 'local-push',
    createdAt: '2026-04-28T00:00:00Z',
    authority: {
      mode: 'local-only',
      consent: 'explicit-operator-consent'
    },
    scope: {
      stream: 'S6',
      surface: 'push-digest',
      reason: 'validator smoke'
    },
    artifacts: [
      {
        path: '.tmp/push/local-envelope.json',
        role: 'output'
      }
    ]
  };
  var r = validate(data, SCHEMA_LOCAL_PUSH_AUDIT_ENVELOPE);
  if (r.valid) {
    return { pass: true, detail: 'minimal local-only envelope matches the additive local push audit contract' };
  }
  return { pass: false, error: r.errors.slice(0, 5).join(' | ') + (r.errors.length > 5 ? ' (+ ' + (r.errors.length - 5) + ' more)' : '') };
});

runTest(g2, 'inline local hub runway report (allowed) validates against SCHEMA_HUB_LOCAL_RUNWAY_REPORT', function() {

runTest(g2, 'SCHEMA_CAPABILITY_GRANT_V0 publishes the stripped-payload signing contract', function() {
  var signing = SCHEMA_CAPABILITY_GRANT_V0['x-ferros-signature'];
  if (!signing || typeof signing !== 'object' || Array.isArray(signing)) {
    return { pass: false, error: 'x-ferros-signature metadata is missing from SCHEMA_CAPABILITY_GRANT_V0' };
  }

  var expectedFields = ['profile_id', 'capability', 'revoked_at', 'revocation_reason'];
  var expectedOptionalFields = ['revoked_at', 'revocation_reason'];
  var expectedActive = '{"profile_id":"profile-alpha","capability":"consent.read"}';
  var expectedRevoked = '{"profile_id":"profile-alpha","capability":"consent.read","revoked_at":"2026-04-23T00:00:00Z","revocation_reason":"manual revoke"}';

  if (signing.algorithm !== 'Ed25519') {
    return { pass: false, error: 'expected algorithm=Ed25519, got ' + JSON.stringify(signing.algorithm) };
  }
  if (signing.payload_encoding !== 'utf-8') {
    return { pass: false, error: 'expected payload_encoding=utf-8, got ' + JSON.stringify(signing.payload_encoding) };
  }
  if (!deepEqual(signing.payload_fields_in_order, expectedFields)) {
    return { pass: false, error: 'payload_fields_in_order drifted: ' + JSON.stringify(signing.payload_fields_in_order) };
  }
  if (!deepEqual(signing.payload_optional_fields, expectedOptionalFields)) {
    return { pass: false, error: 'payload_optional_fields drifted: ' + JSON.stringify(signing.payload_optional_fields) };
  }
  if (!signing.canonical_payload_examples || signing.canonical_payload_examples.active !== expectedActive) {
    return { pass: false, error: 'active canonical payload example drifted: ' + JSON.stringify(signing.canonical_payload_examples && signing.canonical_payload_examples.active) };
  }
  if (signing.canonical_payload_examples.revoked !== expectedRevoked) {
    return { pass: false, error: 'revoked canonical payload example drifted: ' + JSON.stringify(signing.canonical_payload_examples.revoked) };
  }
  if (typeof signing.verification_rule !== 'string' || signing.verification_rule.indexOf('signer_public_key and signature') === -1) {
    return { pass: false, error: 'verification_rule is missing the stripped-payload verification requirement' };
  }

  return { pass: true, detail: 'Ed25519 stripped-payload signing rule matches the published S2 freeze contract' };
});

// 2a: full-profile-stage3 → SCHEMA_PROFILE (C2)
runTest(g2, 'full-profile-stage3 validates against SCHEMA_PROFILE', function() {
  var data = stripFixtureMeta(FIXTURE_FULL_PROFILE_STAGE3);
  var r = validate(data, SCHEMA_PROFILE);
  if (r.valid) return { pass: true, detail: 'all required fields present, no extra keys, nested $refs resolved' };
  return { pass: false, error: r.errors.slice(0, 5).join(' | ') + (r.errors.length > 5 ? ' (+ ' + (r.errors.length - 5) + ' more)' : '') };
});

// 2b: minimal-stage0-profile → SCHEMA_PROFILE (C2)
runTest(g2, 'minimal-stage0-profile validates against SCHEMA_PROFILE', function() {
  var data = stripFixtureMeta(FIXTURE_MINIMAL_STAGE0_PROFILE);
  var r = validate(data, SCHEMA_PROFILE);
  if (r.valid) return { pass: true, detail: 'Stage 0 minimal profile — genesis seal only, null class/streamAffinity' };

  }
  var deckSchemaResult = validate(fixture.deck, SCHEMA_DECK);
  if (!deckSchemaResult.valid) {
    return { pass: false, error: 'unexpected deck schema rejection: ' + deckSchemaResult.errors.slice(0, 2).join(' | ') };
  }
  var allowed = ['demo', 'interactive', 'static'];
  var control = fixture.runtimeHint.control;
  if (allowed.indexOf(control) === -1) {
    return { pass: true, detail: 'PASS (expected): schema accepts shape, but runtime seam must reject unsupported runtimeHint.control="' + control + '"' };
  }
  return { pass: false, error: 'expected unsupported runtimeHint.control in fixture' };
});

// 4f: invalid-arena-export-wrong-type — schema-valid envelope with semantic exportType break (ADR-016 seam)
runTest(g4, 'SCHEMA_DECK accepts invalid-arena-export-wrong-type (exportType is semantic, runtime owns)', function() {
  var fixture = stripFixtureMeta(FIXTURE_INVALID_ARENA_EXPORT_WRONG_TYPE);
  if (!fixture.deck) {
    return { pass: false, error: 'fixture missing deck structure' };
  }
  var deckSchemaResult = validate(fixture.deck, SCHEMA_DECK);
  if (!deckSchemaResult.valid) {
    return { pass: false, error: 'unexpected deck schema rejection: ' + deckSchemaResult.errors.slice(0, 2).join(' | ') };
  }
  if (fixture.exportType !== 'arena-deck') {
    return { pass: true, detail: 'PASS (expected): schema accepts shape, but runtime seam must reject exportType="' + fixture.exportType + '"' };
  }
  return { pass: false, error: 'expected non arena-deck exportType in fixture' };
});

/* ==========================================================================
  GROUP 5 — C6 runtime consumption contract (PR 13)
  Validates the FerrosCore.templateToEvents() output golden fixture and
  enforces malformed-event rejection at the seam boundary.
  ========================================================================== */
var g5 = addGroup('Group 5 — C6 runtime consumption contract (5 expected PASS)');

// 5a: template-to-events-golden events[] each validates against SCHEMA_SCHEDULE_EVENT
runTest(g5, 'template-to-events-golden.events[] each validates against SCHEMA_SCHEDULE_EVENT (CX6-1)', function() {
  var fixture = FIXTURE_TEMPLATE_TO_EVENTS_GOLDEN;
  var events = fixture.events;
  if (!Array.isArray(events) || events.length === 0) {
    return { pass: false, error: 'fixture.events array absent or empty' };
  }
  var errors = [];
  for (var i = 0; i < events.length; i++) {
    var r = validate(events[i], SCHEMA_SCHEDULE_EVENT);
    if (!r.valid) {
      errors.push('events[' + i + '] (' + (events[i].id || '?') + '): ' + r.errors.slice(0, 2).join('; '));
    }
  }
  if (errors.length === 0) {
    return { pass: true, detail: 'all ' + events.length + ' template-derived events conform to SCHEMA_SCHEDULE_EVENT (CX6-1 satisfied)' };
  }
  return { pass: false, error: errors.join(' | ') };
});

// 5b: source.type='template' and source.templateId present on all events (CX6-2)
runTest(g5, 'template-to-events-golden.events[] all have source.type=template and source.templateId (CX6-2)', function() {
  var inputTemplateId = FIXTURE_TEMPLATE_TO_EVENTS_GOLDEN._fixture.inputTemplate.id;
  var events = FIXTURE_TEMPLATE_TO_EVENTS_GOLDEN.events;
  if (!Array.isArray(events) || events.length === 0) {
    return { pass: false, error: 'fixture.events array absent or empty' };
  }
  var errors = [];
  for (var i = 0; i < events.length; i++) {
    var ev = events[i];
    if (!ev.source || ev.source.type !== 'template') {
      errors.push('events[' + i + '].source.type !== "template": ' + JSON.stringify(ev.source));
    } else if (ev.source.templateId !== inputTemplateId) {
      errors.push('events[' + i + '].source.templateId mismatch: expected "' + inputTemplateId + '", got "' + ev.source.templateId + '"');
    }
  }
  if (errors.length === 0) {
    return { pass: true, detail: 'all ' + events.length + ' events carry source.type=template and source.templateId=' + inputTemplateId + ' (CX6-2 satisfied)' };
  }
  return { pass: false, error: errors.join(' | ') };
});

// 5c: id format follows '<templateId>-block-<index>' convention and kind='block' (CX6-1 + CX6-2)
runTest(g5, 'template-to-events-golden.events[] ids follow <templateId>-block-<index> and kind=block (CX6-1+CX6-2)', function() {
  var inputTemplateId = FIXTURE_TEMPLATE_TO_EVENTS_GOLDEN._fixture.inputTemplate.id;
  var events = FIXTURE_TEMPLATE_TO_EVENTS_GOLDEN.events;
  if (!Array.isArray(events) || events.length === 0) {
    return { pass: false, error: 'fixture.events array absent or empty' };
  }
  var errors = [];
  for (var i = 0; i < events.length; i++) {
    var ev = events[i];
    var expectedId = inputTemplateId + '-block-' + i;
    if (ev.id !== expectedId) {
      errors.push('events[' + i + '].id: expected "' + expectedId + '", got "' + ev.id + '"');
    }
    if (ev.kind !== 'block') {
      errors.push('events[' + i + '].kind: expected "block", got "' + ev.kind + '"');
    }
  }
  if (errors.length === 0) {
    return { pass: true, detail: 'all ' + events.length + ' events have correct id pattern and kind=block; stream propagated from template (stream=' + (events[0].stream || 'absent') + ')' };
  }
  return { pass: false, error: errors.join(' | ') };
});

// 5d: invalid-template-to-events-missing-source-type is rejected (CX6 boundary hardening)
runTest(g5, 'invalid-template-to-events-missing-source-type.events[] rejected by SCHEMA_SCHEDULE_EVENT', function() {
  var fixture = FIXTURE_INVALID_TEMPLATE_TO_EVENTS_MISSING_SOURCE_TYPE;
  var events = fixture.events;
  if (!Array.isArray(events) || events.length === 0) {
    return { pass: false, error: 'fixture.events array absent or empty' };
  }
  var rejects = 0;
  var details = [];
  for (var i = 0; i < events.length; i++) {
    var r = validate(events[i], SCHEMA_SCHEDULE_EVENT);
    if (!r.valid) {
      rejects++;
      details.push('events[' + i + '] rejected: ' + r.errors.slice(0, 1).join('; '));
    }
  }
  if (rejects === events.length) {
    return { pass: true, detail: 'all ' + events.length + ' malformed events rejected (missing source.type)' };
  }
  return { pass: false, error: 'expected all events to be rejected, but only ' + rejects + '/' + events.length + ' failed validation' };
});

// 5e: invalid-template-to-events-bad-time-format is rejected (CX6 boundary hardening)
runTest(g5, 'invalid-template-to-events-bad-time-format.events[] rejected by SCHEMA_SCHEDULE_EVENT', function() {
  var fixture = FIXTURE_INVALID_TEMPLATE_TO_EVENTS_BAD_TIME_FORMAT;
  var events = fixture.events;
  if (!Array.isArray(events) || events.length === 0) {
    return { pass: false, error: 'fixture.events array absent or empty' };
  }
  var rejects = 0;
  for (var i = 0; i < events.length; i++) {
    var r = validate(events[i], SCHEMA_SCHEDULE_EVENT);
    if (!r.valid) rejects++;
  }
  if (rejects === events.length) {
    return { pass: true, detail: 'all ' + events.length + ' malformed events rejected (time format)' };
  }
  return { pass: false, error: 'expected all events to be rejected, but only ' + rejects + '/' + events.length + ' failed validation' };
});

/* ==========================================================================
   RENDER RESULTS
   ========================================================================== */

var passed = 0, failed = 0, skipped = 0;
for (var ti = 0; ti < allTests.length; ti++) {
  if (allTests[ti].status === 'pass') passed++;
  else if (allTests[ti].status === 'fail') failed++;
  else skipped++;
}

var groupsEl = document.getElementById('groups');
for (var gi = 0; gi < groups.length; gi++) {
  var grp = groups[gi];
  var h2 = document.createElement('h2');
  h2.textContent = grp.label;
  groupsEl.appendChild(h2);

  for (var ti2 = 0; ti2 < grp.tests.length; ti2++) {
    var t2 = grp.tests[ti2];
    var row = document.createElement('div');
    row.className = 'test';
    var badge = document.createElement('span');
    badge.className = 'badge ' + t2.status;
    badge.textContent = t2.status.toUpperCase();
    var info = document.createElement('div');
    info.style.flex = '1';
    var nameEl = document.createElement('div');
    nameEl.className = 'test-name';
    nameEl.textContent = t2.name;
    info.appendChild(nameEl);
    if (t2.detail) {
      var dEl = document.createElement('div');
      dEl.className = 'test-detail';
      dEl.textContent = t2.detail;
      info.appendChild(dEl);
    }
    if (t2.error) {
      var eEl = document.createElement('div');
      eEl.className = 'test-error';
      eEl.textContent = t2.error;
      info.appendChild(eEl);
    }
    row.appendChild(badge);
    row.appendChild(info);
    groupsEl.appendChild(row);
  }
}

var overallStatus = failed > 0 ? 'FAIL' : (skipped > 0 ? 'SKIP' : 'PASS');
var summaryBar = document.getElementById('summary-bar');
summaryBar.className = 'summary-bar ' + (failed > 0 ? 'has-fail' : (skipped > 0 ? 'has-skip' : 'all-pass'));
summaryBar.innerHTML =
  '<span class="summary-stat">' + overallStatus + '</span>' +
  ' &nbsp;|&nbsp; ' + passed + ' passed, ' + failed + ' failed, ' + skipped + ' skipped' +
  ' &nbsp;|&nbsp; Total: ' + allTests.length + ' tests';

var resultObj = {
  timestamp: new Date().toISOString(),
  harnessId: 'H1',
  harnessVersion: '1.2',
  status: overallStatus,
  summary: { total: allTests.length, passed: passed, failed: failed, skipped: skipped },
  gates: {
    C1_schema_keyword_coverage: 'SUPPORTED validation keywords: type,properties,required,additionalProperties,items,minLength,maxLength,pattern,enum,const,minimum,maximum,minItems,oneOf,$ref. Metadata-only keywords accepted: $schema,$id,$defs,definitions,title,description,default,format,examples,$comment,x-ferros-signature.',
    C2_unsupported_keyword_behaviour: 'FAIL-LOUD — validator returns {valid:false,failLoud:true} immediately',
    C3_ref_scope: 'LOCAL ONLY — #/$defs/<name> and #/definitions/<name> resolved from the corresponding root-schema definition map',
    C4_type_coercion: 'NONE — null/array/object/string/number/integer/boolean checked strictly',
    C5_format_enforcement: 'INFORMATIONAL — format keyword acknowledged, not validated',
    C6_oneOf_semantics: 'STRICT — exactly 1 must match, validator recurses into each branch',
    C7_negative_fixture_detection: groups[2].tests.map(function(t){ return t.name + ': ' + t.status; }),
    C6_consumption_contract: 'PR 13 — Group 5 validates templateToEvents() output shape (CX6-1 event schema, CX6-2 source fields, CX6-2 id pattern)',
    coverage: {
      golden_fixtures_tested: FERROS_GOLDEN_FIXTURES.length,
      negative_fixtures_tested: FERROS_NEGATIVE_FIXTURES.length,
      schemas_covered: FERROS_SCHEMAS.length
    }
  },
  tests: allTests.map(function(t){ return { name: t.name, status: t.status, detail: t.detail, error: t.error }; })
};

document.getElementById('result-json').textContent = JSON.stringify(resultObj, null, 2);
</script>
</body>
</html>
