name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo build
        run: cargo build --workspace --all-targets

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install thumbv7em-none-eabi target
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: rustup target add thumbv7em-none-eabi

      - name: Cargo test
        run: cargo test --workspace --all-targets

      - name: Cargo check ferros-core without default features
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo check -p ferros-core --no-default-features

      - name: Cargo check ferros-core for thumbv7em-none-eabi without default features
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo check -p ferros-core --target thumbv7em-none-eabi --no-default-features

      - name: Cargo run ferros demo
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo run --bin ferros -- demo
